<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>The Almanac</title>
  <meta name="description" content="A personal task almanac." />

  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#2D1B4E" />

  <link rel="apple-touch-icon" href="icon-180.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Almanac" />
  <meta name="format-detection" content="telephone=no" />

  <link rel="icon" type="image/png" href="icon-180.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT@9..144,300..900,0..100&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    html, body {
      margin: 0;
      background: #F7F4EF;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
      -webkit-tap-highlight-color: transparent;
      -webkit-text-size-adjust: 100%;
    }
    body { overscroll-behavior-y: none; }
    .app { font-family: 'Inter', system-ui, sans-serif; }
    .serif { font-family: 'Fraunces', Georgia, serif; font-variation-settings: "SOFT" 30, "opsz" 144; letter-spacing: -0.01em; }
    .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
    @keyframes drawCheck { from { stroke-dashoffset: 24; } to { stroke-dashoffset: 0; } }
    .check-anim { stroke-dasharray: 24; animation: drawCheck 0.4s ease-out forwards; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
    .pulse-dot { animation: pulse 1.6s ease-in-out infinite; }
    @keyframes slideDown { from { transform: translateY(-10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .slide-down { animation: slideDown 0.4s ease-out; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .fade-in { animation: fadeIn 0.6s ease-out; }
    @keyframes confettiFall {
      0% { transform: translate(0, 0) rotate(0deg); opacity: 1; }
      100% { transform: translate(var(--x-end), 100vh) rotate(720deg); opacity: 0; }
    }
    .confetti-piece { position: fixed; width: 8px; height: 14px; animation: confettiFall var(--duration) ease-out forwards; pointer-events: none; z-index: 100; }
    @keyframes scaleBounce {
      0% { transform: scale(0.9); opacity: 0; }
      40% { transform: scale(1.05); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }
    .scale-bounce { animation: scaleBounce 0.5s ease-out; }
    button, input, select, textarea { font-size: 16px; }
    .loading { font-family: 'Fraunces', Georgia, serif; font-style: italic; color: #2D1B4E; }
  </style>
</head>
<body>
  <div id="root">
    <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;">
      <p class="loading" style="font-size:1.5rem;opacity:0.5;">Opening the almanac…</p>
    </div>
  </div>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useRef, useMemo } = React;

    const ICON_PATHS = {
      plus: <path d="M12 5v14M5 12h14" />,
      check: <path d="M20 6 9 17l-5-5" />,
      play: <polygon points="6 3 20 12 6 21 6 3" />,
      pause: <g><rect x="6" y="4" width="4" height="16" /><rect x="14" y="4" width="4" height="16" /></g>,
      bell: <g><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9" /><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0" /></g>,
      bellOff: <g><path d="M8.7 3A6 6 0 0 1 18 8a21.3 21.3 0 0 0 .6 5" /><path d="M17 17H3s3-2 3-9" /><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0" /><line x1="2" y1="2" x2="22" y2="22" /></g>,
      trash: <g><polyline points="3 6 5 6 21 6" /><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" /><path d="M10 11v6M14 11v6" /></g>,
      calendar: <g><rect x="3" y="4" width="18" height="18" rx="2" /><line x1="16" y1="2" x2="16" y2="6" /><line x1="8" y1="2" x2="8" y2="6" /><line x1="3" y1="10" x2="21" y2="10" /></g>,
      clock: <g><circle cx="12" cy="12" r="10" /><polyline points="12 6 12 12 16 14" /></g>,
      x: <path d="M18 6 6 18M6 6l12 12" />,
      alert: <g><circle cx="12" cy="12" r="10" /><line x1="12" y1="8" x2="12" y2="12" /><line x1="12" y1="16" x2="12.01" y2="16" /></g>,
      share: <g><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8" /><polyline points="16 6 12 2 8 6" /><line x1="12" y1="2" x2="12" y2="15" /></g>,
      settings: <g><circle cx="12" cy="12" r="3" /><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z" /></g>,
      sync: <g><polyline points="23 4 23 10 17 10" /><polyline points="1 20 1 14 7 14" /><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15" /></g>,
      cloud: <path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z" />,
      cloudOff: <g><path d="M22.61 16.95A5 5 0 0 0 18 10h-1.26a8 8 0 0 0-7.05-6M5 5a8 8 0 0 0 4 15h9a5 5 0 0 0 1.7-.3" /><line x1="1" y1="1" x2="23" y2="23" /></g>,
      flame: <path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z" />,
      dumbbell: <g><path d="M14.4 14.4 9.6 9.6" /><path d="M18.66 14.83 17.24 16.24a2 2 0 0 1-2.83 0l-4.66-4.66a2 2 0 0 1 0-2.83L11.17 7.34a2 2 0 0 1 2.83 0l4.66 4.66a2 2 0 0 1 0 2.83Z"/><path d="m21.64 12.2-1.41 1.42" /><path d="M3.79 11.78 2.37 13.2" /><path d="M5.21 6.84 6.62 5.42a2 2 0 0 1 2.83 0l1.42 1.41" /><path d="m13.13 17.55 1.42 1.41a2 2 0 0 1 0 2.83L13.13 23.2"/></g>,
      apple: <g><path d="M19 11.86c0 4.42-3 8.14-7 8.14s-7-3.72-7-8.14c0-2.49 1.13-4.74 2.83-6 .85-.6 1.83-.86 2.67-.86s1.5.4 1.5.4c.27.13.4.13.5.13s.23 0 .5-.13c0 0 .67-.4 1.5-.4s1.82.26 2.67.86c1.7 1.26 2.83 3.51 2.83 6Z"/><path d="M12 5.5C12 4 13 2 15 2"/></g>,
      droplet: <path d="M12 2.69 4.93 9.76a10 10 0 1 0 14.14 0L12 2.69Z" />,
    };
    const Icon = ({ name, size = 14, className = "", style = {}, ...props }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} style={style} {...props}>{ICON_PATHS[name]}</svg>
    );

    const STORAGE_KEY = "almanac_tasks_v1";
    const LASTSEEN_KEY = "almanac_lastseen";
    const INSTALL_DISMISSED_KEY = "almanac_install_dismissed";
    const GIST_TOKEN_KEY = "almanac_gist_token";
    const GIST_ID_KEY = "almanac_gist_id";
    const WELLNESS_KEY = "almanac_wellness_v1";  // { "YYYY-MM-DD": { water: 0-10, exercise: bool, diet: bool } }

    const loadTasks = () => { try { const v = localStorage.getItem(STORAGE_KEY); return v ? JSON.parse(v) : []; } catch { return []; } };
    const saveTasks = (tasks) => { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks)); } catch (e) { console.error(e); } };
    const loadLastSeen = () => { try { return localStorage.getItem(LASTSEEN_KEY) || null; } catch { return null; } };
    const saveLastSeen = () => { try { localStorage.setItem(LASTSEEN_KEY, new Date().toISOString()); } catch {} };
    const loadWellness = () => { try { const v = localStorage.getItem(WELLNESS_KEY); return v ? JSON.parse(v) : {}; } catch { return {}; } };
    const saveWellness = (w) => { try { localStorage.setItem(WELLNESS_KEY, JSON.stringify(w)); } catch (e) { console.error(e); } };

    const GIST_FILENAME = "almanac-tasks.json";
    const GIST_DESCRIPTION = "The Almanac — personal task data (private)";
    const Gist = {
      getToken: () => { try { return localStorage.getItem(GIST_TOKEN_KEY) || null; } catch { return null; } },
      setToken: (t) => { try { if (t) localStorage.setItem(GIST_TOKEN_KEY, t); else localStorage.removeItem(GIST_TOKEN_KEY); } catch {} },
      getId: () => { try { return localStorage.getItem(GIST_ID_KEY) || null; } catch { return null; } },
      setId: (id) => { try { if (id) localStorage.setItem(GIST_ID_KEY, id); else localStorage.removeItem(GIST_ID_KEY); } catch {} },
      findOrCreate: async (token) => {
        const r = await fetch("https://api.github.com/gists?per_page=100", { headers: { "Authorization": `Bearer ${token}`, "Accept": "application/vnd.github+json" } });
        if (!r.ok) throw new Error(`GitHub auth failed (${r.status})`);
        const gists = await r.json();
        const existing = gists.find((g) => g.description === GIST_DESCRIPTION && g.files && g.files[GIST_FILENAME]);
        if (existing) return existing.id;
        const cr = await fetch("https://api.github.com/gists", {
          method: "POST",
          headers: { "Authorization": `Bearer ${token}`, "Accept": "application/vnd.github+json", "Content-Type": "application/json" },
          body: JSON.stringify({ description: GIST_DESCRIPTION, public: false, files: { [GIST_FILENAME]: { content: JSON.stringify({ tasks: [], updatedAt: nowISO() }, null, 2) } } }),
        });
        if (!cr.ok) throw new Error(`Couldn't create gist (${cr.status})`);
        const created = await cr.json();
        return created.id;
      },
      fetch: async (token, gistId) => {
        const r = await fetch(`https://api.github.com/gists/${gistId}`, { headers: { "Authorization": `Bearer ${token}`, "Accept": "application/vnd.github+json" } });
        if (!r.ok) throw new Error(`Fetch failed (${r.status})`);
        const data = await r.json();
        const file = data.files && data.files[GIST_FILENAME];
        if (!file) return { tasks: [], wellness: {}, updatedAt: null };
        let content = file.content;
        if (file.truncated && file.raw_url) { const raw = await fetch(file.raw_url); content = await raw.text(); }
        try { const parsed = JSON.parse(content); return { tasks: parsed.tasks || [], wellness: parsed.wellness || {}, updatedAt: parsed.updatedAt || null }; }
        catch { return { tasks: [], wellness: {}, updatedAt: null }; }
      },
      push: async (token, gistId, tasks, wellness = {}) => {
        const payload = { tasks, wellness, updatedAt: nowISO() };
        const r = await fetch(`https://api.github.com/gists/${gistId}`, {
          method: "PATCH",
          headers: { "Authorization": `Bearer ${token}`, "Accept": "application/vnd.github+json", "Content-Type": "application/json" },
          body: JSON.stringify({ files: { [GIST_FILENAME]: { content: JSON.stringify(payload, null, 2) } } }),
        });
        if (!r.ok) throw new Error(`Push failed (${r.status})`);
        return payload.updatedAt;
      },
    };

    const isIOS = () => /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
    const isInStandaloneMode = () => window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
    const uid = () => Math.random().toString(36).slice(2, 11);
    const nowISO = () => new Date().toISOString();
    const dateKey = (d) => { const x = new Date(d); return `${x.getFullYear()}-${String(x.getMonth()+1).padStart(2,'0')}-${String(x.getDate()).padStart(2,'0')}`; };
    const fmtDateTime = (iso) => {
      if (!iso) return "—";
      const d = new Date(iso);
      const today = new Date();
      const tomorrow = new Date(); tomorrow.setDate(today.getDate() + 1);
      const sameDay = (a, b) => a.toDateString() === b.toDateString();
      const time = d.toLocaleTimeString([], { hour: "numeric", minute: "2-digit" });
      if (sameDay(d, today)) return `Today · ${time}`;
      if (sameDay(d, tomorrow)) return `Tomorrow · ${time}`;
      return `${d.toLocaleDateString([], { month: "short", day: "numeric" })} · ${time}`;
    };
    const fmtDuration = (mins) => { if (!mins || mins < 1) return "0m"; const h = Math.floor(mins / 60); const m = Math.floor(mins % 60); if (h && m) return `${h}h ${m}m`; if (h) return `${h}h`; return `${m}m`; };
    const isOverdue = (t) => t.dueDate && t.status !== "done" && new Date(t.dueDate) < new Date();
    const isToday = (iso) => { if (!iso) return false; return new Date(iso).toDateString() === new Date().toDateString(); };

    const QUOTES = {
      start: ["Begin where you are. Use what you have.","Small steps are still steps.","The first move is the hardest. Make it now.","Discipline is choosing what you want most over what you want now.","A year from now, you'll wish you started today.","The secret of getting ahead is getting started.","Action is the foundational key to all success.","Don't wait for opportunity. Create it."],
      early: ["Momentum is yours. Keep the pace.","You've started. The hard part is behind you.","Progress, not perfection.","The expert in anything was once a beginner.","Energy follows action. Keep moving.","You're doing better than you think.","Each task done is proof you can.","Steady wins the long game."],
      late: ["Halfway is closer to the end than to the start.","Finish strong. The peak is in sight.","You've come this far. Don't stop now.","The last stretch is where champions are made.","Push through. Future you is watching.","Almost there — every step counts double now.","The reward is at the finish line, not before.","Don't quit on a hard day."],
      done: ["Today is conquered. Rest well.","Discipline delivered. Proud of you.","You did it. Every single one.","This is what consistency looks like.","Days like these build the life you want.","Closed every loop. Sleep easy.","Today's version of you would impress yesterday's.","Mission accomplished. Tomorrow awaits."],
      empty: ["A blank page. What will you write?","Today is a gift. Open it intentionally.","What would today look like if it went well?","Add one task. Just one. That's enough.","Plans without action are wishes."],
    };
    const pickQuote = (bucket) => {
      const list = QUOTES[bucket] || QUOTES.start;
      const seed = dateKey(new Date()) + ":" + bucket;
      let h = 0; for (let i = 0; i < seed.length; i++) h = (h * 31 + seed.charCodeAt(i)) | 0;
      return list[Math.abs(h) % list.length];
    };
    const quoteBucket = (pct, total) => { if (total === 0) return "empty"; if (pct >= 100) return "done"; if (pct >= 50) return "late"; if (pct > 0) return "early"; return "start"; };

    const greeting = () => { const h = new Date().getHours(); if (h < 5) return "Burning the midnight oil"; if (h < 12) return "Good morning"; if (h < 17) return "Make it count"; if (h < 21) return "Evening, finish strong"; return "Wind down well"; };

    const computeStreak = (tasks) => {
      const completedDays = new Set();
      tasks.forEach((t) => { if (t.status === "done" && t.completedAt) completedDays.add(dateKey(t.completedAt)); });
      if (completedDays.size === 0) return 0;
      let streak = 0;
      const cursor = new Date();
      if (!completedDays.has(dateKey(cursor))) cursor.setDate(cursor.getDate() - 1);
      while (completedDays.has(dateKey(cursor))) { streak++; cursor.setDate(cursor.getDate() - 1); }
      return streak;
    };

    const fireConfetti = (intensity = "small") => {
      const count = intensity === "big" ? 60 : 16;
      const colors = ["#FF8A4C", "#F5C85A", "#7E5BC8", "#5B3A8F", "#E8B4D8"];
      const layer = document.createElement("div");
      layer.style.cssText = "position:fixed;inset:0;pointer-events:none;z-index:100;";
      for (let i = 0; i < count; i++) {
        const piece = document.createElement("div");
        const xStart = (Math.random() * 100) + "vw";
        const xEnd = (Math.random() * 200 - 100) + "px";
        const duration = (1.2 + Math.random() * 1.6) + "s";
        const color = colors[Math.floor(Math.random() * colors.length)];
        const rotate = Math.random() * 360;
        piece.className = "confetti-piece";
        piece.style.cssText = `left:${xStart};top:${intensity === "big" ? "20%" : "30%"};background:${color};--x-end:${xEnd};--duration:${duration};transform:rotate(${rotate}deg);border-radius:${Math.random() > 0.5 ? "2px" : "50%"};`;
        layer.appendChild(piece);
      }
      document.body.appendChild(layer);
      setTimeout(() => layer.remove(), 3000);
    };

    function ProgressRing({ pct, size = 90, stroke = 6, color = "#FF8A4C", trackColor = "rgba(255,255,255,0.18)" }) {
      const r = (size - stroke) / 2;
      const c = 2 * Math.PI * r;
      const offset = c - (Math.min(100, pct) / 100) * c;
      return (
        <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={trackColor} strokeWidth={stroke} />
          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke} strokeLinecap="round" strokeDasharray={c} strokeDashoffset={offset} transform={`rotate(-90 ${size/2} ${size/2})`} style={{ transition: "stroke-dashoffset 0.9s cubic-bezier(0.4,0,0.2,1)" }} />
        </svg>
      );
    }

    function App() {
      const [tasks, setTasks] = useState([]);
      const [loaded, setLoaded] = useState(false);
      const [filter, setFilter] = useState("today");
      const [editing, setEditing] = useState(null);
      const [notifPermission, setNotifPermission] = useState(typeof Notification !== "undefined" ? Notification.permission : "default");
      const [tick, setTick] = useState(0);
      const [missedReminders, setMissedReminders] = useState([]);
      const [showIOSInstall, setShowIOSInstall] = useState(false);
      const [showSettings, setShowSettings] = useState(false);
      const [syncStatus, setSyncStatus] = useState(Gist.getToken() ? "idle" : "off");
      const [syncError, setSyncError] = useState(null);
      const [lastSyncAt, setLastSyncAt] = useState(null);
      const [showDailySummary, setShowDailySummary] = useState(false);
      const [wellness, setWellness] = useState(() => loadWellness());
      const firedRef = useRef(new Set());
      const pushTimerRef = useRef(null);
      const lastPushedRef = useRef(null);
      const lastRemoteUpdatedRef = useRef(null);
      const prevTodayPctRef = useRef(0);
      const summaryShownTodayRef = useRef(false);

      useEffect(() => {
        const t = loadTasks();
        setTasks(t);
        setLoaded(true);
        const lastSeen = loadLastSeen();
        if (lastSeen) {
          const lastSeenDate = new Date(lastSeen);
          const now = new Date();
          const missed = t.filter((task) => {
            if (task.status === "done" || !task.reminderSet || !task.dueDate || task.remindMinutesBefore == null) return false;
            const triggerAt = new Date(task.dueDate).getTime() - task.remindMinutesBefore * 60000;
            return triggerAt >= lastSeenDate.getTime() && triggerAt <= now.getTime();
          });
          setMissedReminders(missed);
        }
        saveLastSeen();
        if (isIOS() && !isInStandaloneMode() && !localStorage.getItem(INSTALL_DISMISSED_KEY)) setShowIOSInstall(true);
        const seenInterval = setInterval(saveLastSeen, 30000);
        const onHide = () => saveLastSeen();
        document.addEventListener("visibilitychange", onHide);
        window.addEventListener("pagehide", onHide);
        return () => { clearInterval(seenInterval); document.removeEventListener("visibilitychange", onHide); window.removeEventListener("pagehide", onHide); };
      }, []);

      useEffect(() => { if (loaded) saveTasks(tasks); }, [tasks, loaded]);
      useEffect(() => { saveWellness(wellness); }, [wellness]);

      const todayKey = dateKey(new Date());
      const todayWellness = wellness[todayKey] || { water: 0, exercise: false, diet: false };
      const updateWellness = (patch) => {
        setWellness((prev) => ({ ...prev, [todayKey]: { ...todayWellness, ...patch } }));
      };
      const setWaterGlasses = (n) => updateWellness({ water: Math.max(0, Math.min(10, n)) });
      const toggleExercise = () => updateWellness({ exercise: !todayWellness.exercise });
      const toggleDiet = () => updateWellness({ diet: !todayWellness.diet });

      useEffect(() => {
        if (!loaded) return;
        const token = Gist.getToken(); if (!token) return;
        let cancelled = false;
        (async () => {
          try {
            setSyncStatus("syncing");
            let gistId = Gist.getId();
            if (!gistId) { gistId = await Gist.findOrCreate(token); Gist.setId(gistId); }
            const remote = await Gist.fetch(token, gistId);
            if (cancelled) return;
            const localTasks = loadTasks();
            const localWellness = loadWellness();
            if (remote.tasks.length > 0 || Object.keys(remote.wellness || {}).length > 0) {
              setTasks(remote.tasks);
              setWellness(remote.wellness || {});
              lastPushedRef.current = JSON.stringify({ tasks: remote.tasks, wellness: remote.wellness || {} });
              lastRemoteUpdatedRef.current = remote.updatedAt;
            }
            else if (localTasks.length > 0 || Object.keys(localWellness).length > 0) {
              const updatedAt = await Gist.push(token, gistId, localTasks, localWellness);
              lastPushedRef.current = JSON.stringify({ tasks: localTasks, wellness: localWellness });
              lastRemoteUpdatedRef.current = updatedAt;
            }
            setSyncStatus("idle"); setLastSyncAt(new Date()); setSyncError(null);
          } catch (e) { if (!cancelled) { setSyncStatus("error"); setSyncError(e.message || "Sync failed"); } }
        })();
        return () => { cancelled = true; };
      }, [loaded]);

      useEffect(() => {
        if (!loaded) return;
        const token = Gist.getToken(); const gistId = Gist.getId();
        if (!token || !gistId) return;
        const serialized = JSON.stringify({ tasks, wellness });
        if (serialized === lastPushedRef.current) return;
        if (pushTimerRef.current) clearTimeout(pushTimerRef.current);
        pushTimerRef.current = setTimeout(async () => {
          try {
            setSyncStatus("syncing");
            const updatedAt = await Gist.push(token, gistId, tasks, wellness);
            lastPushedRef.current = serialized; lastRemoteUpdatedRef.current = updatedAt;
            setSyncStatus("idle"); setLastSyncAt(new Date()); setSyncError(null);
          } catch (e) { setSyncStatus("error"); setSyncError(e.message || "Sync failed"); }
        }, 1500);
        return () => { if (pushTimerRef.current) clearTimeout(pushTimerRef.current); };
      }, [tasks, wellness, loaded]);

      useEffect(() => {
        if (!loaded) return;
        const token = Gist.getToken(); if (!token) return;
        const poll = async () => {
          if (pushTimerRef.current) return;
          if (document.hidden) return;
          try {
            const gistId = Gist.getId(); if (!gistId) return;
            const remote = await Gist.fetch(token, gistId);
            if (remote.updatedAt && remote.updatedAt !== lastRemoteUpdatedRef.current) {
              const remoteSerialized = JSON.stringify({ tasks: remote.tasks, wellness: remote.wellness || {} });
              const localSerialized = JSON.stringify({ tasks, wellness });
              if (remoteSerialized !== localSerialized) {
                setTasks(remote.tasks);
                setWellness(remote.wellness || {});
                lastPushedRef.current = remoteSerialized;
                setLastSyncAt(new Date());
              }
              lastRemoteUpdatedRef.current = remote.updatedAt;
            }
          } catch (e) { console.warn("Poll failed:", e); }
        };
        const interval = setInterval(poll, 30000);
        const onVis = () => { if (!document.hidden) poll(); };
        document.addEventListener("visibilitychange", onVis);
        return () => { clearInterval(interval); document.removeEventListener("visibilitychange", onVis); };
      }, [loaded, tasks, wellness]);

      const triggerSync = async () => {
        const token = Gist.getToken();
        if (!token) { setShowSettings(true); return; }
        try {
          setSyncStatus("syncing");
          let gistId = Gist.getId();
          if (!gistId) { gistId = await Gist.findOrCreate(token); Gist.setId(gistId); }
          const remote = await Gist.fetch(token, gistId);
          setTasks(remote.tasks);
          setWellness(remote.wellness || {});
          lastPushedRef.current = JSON.stringify({ tasks: remote.tasks, wellness: remote.wellness || {} });
          lastRemoteUpdatedRef.current = remote.updatedAt;
          setSyncStatus("idle"); setLastSyncAt(new Date()); setSyncError(null);
        } catch (e) { setSyncStatus("error"); setSyncError(e.message || "Sync failed"); }
      };

      useEffect(() => {
        const i = setInterval(() => {
          setTick((x) => x + 1);
          const now = Date.now();
          tasks.forEach((t) => {
            if (t.reminderSet && t.dueDate && t.remindMinutesBefore != null && t.status !== "done" && !firedRef.current.has(t.id)) {
              const triggerAt = new Date(t.dueDate).getTime() - t.remindMinutesBefore * 60000;
              if (now >= triggerAt && now <= triggerAt + 60000) {
                firedRef.current.add(t.id);
                if (typeof Notification !== "undefined" && Notification.permission === "granted") {
                  try { new Notification("Task reminder", { body: `${t.title} — due ${fmtDateTime(t.dueDate)}`, tag: t.id, icon: "icon-180.png" }); } catch {}
                }
                try {
                  const ctx = new (window.AudioContext || window.webkitAudioContext)();
                  const o = ctx.createOscillator(); const g = ctx.createGain();
                  o.connect(g); g.connect(ctx.destination);
                  o.frequency.value = 660;
                  g.gain.setValueAtTime(0.0001, ctx.currentTime);
                  g.gain.exponentialRampToValueAtTime(0.15, ctx.currentTime + 0.05);
                  g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.6);
                  o.start(); o.stop(ctx.currentTime + 0.6);
                } catch {}
              }
            }
          });
        }, 1000);
        return () => clearInterval(i);
      }, [tasks]);

      const upsertTask = (t) => setTasks((prev) => { const i = prev.findIndex((x) => x.id === t.id); if (i === -1) return [t, ...prev]; const next = [...prev]; next[i] = t; return next; });
      const removeTask = (id) => setTasks((prev) => prev.filter((t) => t.id !== id));

      const toggleStatus = (t, target) => {
        let next = { ...t };
        const wasNotDone = t.status !== "done";
        if (target === "doing" && t.status !== "doing") { next.status = "doing"; next.startedAt = nowISO(); }
        else if (target === "todo" && t.status === "doing") { const elapsed = (Date.now() - new Date(t.startedAt).getTime()) / 60000; next.actualMinutes = (t.actualMinutes || 0) + elapsed; next.status = "todo"; next.startedAt = null; }
        else if (target === "done") {
          if (t.status === "doing" && t.startedAt) { const elapsed = (Date.now() - new Date(t.startedAt).getTime()) / 60000; next.actualMinutes = (t.actualMinutes || 0) + elapsed; }
          next.status = "done"; next.completedAt = nowISO(); next.startedAt = null;
          if (wasNotDone) fireConfetti("small");
        }
        else if (target === "todo" && t.status === "done") { next.status = "todo"; next.completedAt = null; }
        upsertTask(next);
      };

      const requestNotifPermission = async () => { if (typeof Notification === "undefined") return; try { const p = await Notification.requestPermission(); setNotifPermission(p); } catch {} };

      const filtered = tasks.filter((t) => {
        if (filter === "today") { if (t.status === "done") return isToday(t.completedAt); return isToday(t.dueDate) || isOverdue(t); }
        if (filter === "upcoming") return t.status !== "done" && t.dueDate && new Date(t.dueDate) > new Date();
        if (filter === "overdue") return isOverdue(t);
        if (filter === "done") return t.status === "done";
        return true;
      }).sort((a, b) => {
        if (a.status === "doing" && b.status !== "doing") return -1;
        if (b.status === "doing" && a.status !== "doing") return 1;
        if (a.status === "done" && b.status !== "done") return 1;
        if (b.status === "done" && a.status !== "done") return -1;
        if (a.dueDate && b.dueDate) return new Date(a.dueDate) - new Date(b.dueDate);
        if (a.dueDate) return -1; if (b.dueDate) return 1;
        return 0;
      });

      const todayTasks = tasks.filter((t) => { if (t.status === "done") return isToday(t.completedAt); return isToday(t.dueDate) || isOverdue(t); });
      const todayDone = todayTasks.filter((t) => t.status === "done").length;
      const todayTotal = todayTasks.length;
      const todayPct = todayTotal === 0 ? 0 : Math.round((todayDone / todayTotal) * 100);

      const todayMinsTracked = tasks.reduce((s, t) => {
        const counts = (t.completedAt && isToday(t.completedAt)) || (t.status === "doing" && t.startedAt);
        if (!counts) return s;
        let m = t.actualMinutes || 0;
        if (t.status === "doing" && t.startedAt) m += (Date.now() - new Date(t.startedAt).getTime()) / 60000;
        return s + m;
      }, 0);

      const weekDone = tasks.filter((t) => { if (t.status !== "done" || !t.completedAt) return false; const c = new Date(t.completedAt); const wkAgo = new Date(); wkAgo.setDate(wkAgo.getDate() - 7); return c > wkAgo; }).length;

      const streak = useMemo(() => computeStreak(tasks), [tasks]);

      useEffect(() => {
        if (!loaded) return;
        if (todayTotal > 0 && todayPct === 100 && prevTodayPctRef.current < 100 && !summaryShownTodayRef.current) {
          summaryShownTodayRef.current = true;
          fireConfetti("big");
          setShowDailySummary(true);
        }
        prevTodayPctRef.current = todayPct;
      }, [todayPct, todayTotal, loaded]);

      const quote = pickQuote(quoteBucket(todayPct, todayTotal));
      const greetingText = greeting();
      const dateLine = new Date().toLocaleDateString([], { weekday: "long", month: "long", day: "numeric" }).toUpperCase();

      return (
        <div className="app min-h-screen w-full" style={{ background: "#F7F4EF", color: "#1F1730" }}>
          <div className="max-w-3xl mx-auto px-4 py-6 sm:px-8 sm:py-10">

            {showIOSInstall && (
              <div className="slide-down mb-4 rounded-xl px-4 py-3 flex items-start justify-between gap-3" style={{ background: "rgba(91,58,143,0.08)", border: "1px solid rgba(91,58,143,0.2)" }}>
                <div className="flex-1">
                  <p className="mono uppercase text-[10px] tracking-[0.2em] mb-1" style={{ color: "#5B3A8F" }}>Install on iPhone</p>
                  <p className="text-sm leading-relaxed text-stone-700">
                    Tap <Icon name="share" size={14} className="inline mb-0.5" /> Share, then <span className="font-semibold">Add to Home Screen</span>.
                  </p>
                </div>
                <button onClick={() => { localStorage.setItem(INSTALL_DISMISSED_KEY, "1"); setShowIOSInstall(false); }} className="text-stone-500 hover:text-stone-800"><Icon name="x" size={16} /></button>
              </div>
            )}

            {missedReminders.length > 0 && (
              <div className="slide-down mb-4 rounded-xl px-4 py-3" style={{ background: "rgba(255,138,76,0.1)", border: "1px solid rgba(255,138,76,0.3)" }}>
                <div className="flex items-start justify-between gap-4">
                  <div>
                    <p className="mono uppercase text-[10px] tracking-[0.2em] mb-1" style={{ color: "#C56A2C" }}>While you were away</p>
                    <p className="serif italic text-lg" style={{ color: "#1F1730" }}>{missedReminders.length} reminder{missedReminders.length > 1 ? "s" : ""} due since you last opened this.</p>
                    <ul className="mt-2 space-y-1">
                      {missedReminders.map((t) => (<li key={t.id} className="text-sm text-stone-800">· {t.title} <span className="mono text-[10px] text-stone-600 ml-2">{fmtDateTime(t.dueDate)}</span></li>))}
                    </ul>
                  </div>
                  <button onClick={() => setMissedReminders([])} className="text-stone-600"><Icon name="x" size={16} /></button>
                </div>
              </div>
            )}

            {/* Hero card */}
            <div className="rounded-2xl p-5 sm:p-7 mb-4 relative overflow-hidden text-white shadow-lg" style={{ background: "linear-gradient(135deg, #2D1B4E 0%, #5B3A8F 60%, #6E4DA8 100%)" }}>
              <div className="absolute pointer-events-none" style={{ top: "-30px", right: "-30px", width: "140px", height: "140px", borderRadius: "50%", background: "rgba(255,138,76,0.18)" }} />
              <div className="absolute pointer-events-none" style={{ bottom: "-40px", left: "-40px", width: "120px", height: "120px", borderRadius: "50%", background: "rgba(245,200,90,0.12)" }} />

              <div className="relative flex items-start justify-between gap-3 mb-5">
                <div className="min-w-0 flex-1">
                  <p className="mono text-[10px] tracking-[0.2em] mb-1" style={{ color: "#F5C85A", fontWeight: 500 }}>{dateLine}</p>
                  <h1 className="text-2xl sm:text-3xl font-semibold" style={{ color: "#FFFFFF" }}>{greetingText}</h1>
                </div>
                <div className="flex items-center gap-1 flex-shrink-0">
                  <SyncIndicator status={syncStatus} lastSyncAt={lastSyncAt} onClick={triggerSync} hasToken={!!Gist.getToken()} />
                  <button onClick={() => setShowSettings(true)} className="p-2 rounded-lg text-white/70 hover:text-white hover:bg-white/10" aria-label="Settings"><Icon name="settings" size={16} /></button>
                </div>
              </div>

              <div className="relative flex items-center gap-4 sm:gap-5 fade-in">
                <div className="relative flex-shrink-0">
                  <ProgressRing pct={todayPct} size={92} stroke={6} color="#FF8A4C" />
                  <div className="absolute inset-0 flex flex-col items-center justify-center">
                    <span className="text-2xl font-semibold" style={{ color: "#FFFFFF" }}>{todayPct}%</span>
                    <span className="text-[10px]" style={{ color: "#C9B8E8" }}>{todayDone} of {todayTotal}</span>
                  </div>
                </div>
                <div className="flex-1 min-w-0">
                  <p className="serif italic text-[15px] sm:text-base leading-snug mb-1" style={{ color: "#F5C85A" }}>"{quote}"</p>
                  <p className="text-[11px]" style={{ color: "#C9B8E8" }}>
                    {todayTotal === 0 ? "No tasks scheduled today." : `${todayTotal} task${todayTotal === 1 ? "" : "s"} · ${fmtDuration(todayMinsTracked)} logged`}
                  </p>
                </div>
              </div>

              {streak > 0 && (
                <div className="relative mt-4 inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full" style={{ background: "rgba(255,138,76,0.22)", border: "1px solid rgba(255,138,76,0.4)" }}>
                  <Icon name="flame" size={13} style={{ color: "#FFB988" }} />
                  <span className="text-[12px] font-medium" style={{ color: "#FFD9C0" }}>{streak} day{streak === 1 ? "" : "s"} strong</span>
                </div>
              )}

              {notifPermission !== "granted" && isInStandaloneMode() && (
                <button onClick={requestNotifPermission} className="relative mt-4 mono uppercase text-[10px] tracking-[0.15em] flex items-center gap-1.5" style={{ color: "#F5C85A" }}>
                  <Icon name="bell" size={11} /> Enable notifications
                </button>
              )}
            </div>

            <div className="grid grid-cols-2 gap-2 sm:gap-3 mb-3">
              <StatCard label="This week" value={weekDone} valueColor="#2D1B4E" />
              <StatCard label="Streak" value={streak === 0 ? "—" : `${streak}d`} valueColor="#FF8A4C" />
            </div>

            <WellnessPanel
              water={todayWellness.water}
              exercise={todayWellness.exercise}
              diet={todayWellness.diet}
              onWaterChange={setWaterGlasses}
              onExerciseToggle={toggleExercise}
              onDietToggle={toggleDiet}
            />

            <QuickAdd onAdd={(t) => upsertTask(t)} />

            <nav className="flex gap-x-1 sm:gap-x-2 mt-5 mb-4 overflow-x-auto -mx-1 px-1 pb-1">
              {[["today","Today"],["upcoming","Upcoming"],["overdue","Overdue"],["all","All"],["done","Archive"]].map(([k, label]) => {
                const count = k === "today" ? todayTasks.length :
                  k === "upcoming" ? tasks.filter((t) => t.status !== "done" && t.dueDate && new Date(t.dueDate) > new Date()).length :
                  k === "overdue" ? tasks.filter(isOverdue).length :
                  k === "done" ? tasks.filter((t) => t.status === "done").length : tasks.length;
                const active = filter === k;
                return (
                  <button key={k} onClick={() => setFilter(k)}
                    className="text-[12px] font-medium px-3 py-1.5 rounded-full whitespace-nowrap transition-all"
                    style={{ background: active ? "#2D1B4E" : "transparent", color: active ? "#FFFFFF" : "#5F4F7A", border: active ? "1px solid #2D1B4E" : "1px solid rgba(45,27,78,0.15)" }}>
                    {label} <span style={{ opacity: 0.6 }}>{count}</span>
                  </button>
                );
              })}
            </nav>

            <main>
              {filtered.length === 0 ? (
                <div className="py-16 text-center fade-in">
                  <p className="serif italic text-2xl sm:text-3xl" style={{ color: "#5B3A8F", opacity: 0.6 }}>
                    {filter === "today" ? "Your day is open." : filter === "done" ? "Nothing archived yet." : "No entries here."}
                  </p>
                  <p className="mono text-[11px] uppercase tracking-[0.15em] mt-3" style={{ color: "#5B3A8F", opacity: 0.4 }}>
                    {filter === "today" ? "Add a task above to begin" : "Try another view"}
                  </p>
                </div>
              ) : (
                <ul className="space-y-2">
                  {filtered.map((t) => (<TaskRow key={t.id} task={t} tick={tick} onToggle={toggleStatus} onEdit={() => setEditing(t)} onDelete={() => removeTask(t.id)} />))}
                </ul>
              )}
            </main>

            <footer className="mt-12 pt-5 border-t border-stone-300/40">
              <p className="mono text-[10px] uppercase tracking-[0.2em] text-stone-500">
                {tasks.length} {tasks.length === 1 ? "entry" : "entries"} · saved {Gist.getToken() ? "synced" : "on this device"}
              </p>
            </footer>
          </div>

          {editing && (<TaskEditor task={editing === "new" ? null : editing} onSave={(t) => { upsertTask(t); setEditing(null); }} onClose={() => setEditing(null)} onDelete={(id) => { removeTask(id); setEditing(null); }} />)}
          {showSettings && (<SettingsModal onClose={() => setShowSettings(false)} syncStatus={syncStatus} syncError={syncError} setSyncStatus={setSyncStatus} setSyncError={setSyncError} setLastSyncAt={setLastSyncAt} tasks={tasks} setTasks={setTasks} wellness={wellness} setWellness={setWellness} lastPushedRef={lastPushedRef} lastRemoteUpdatedRef={lastRemoteUpdatedRef} />)}
          {showDailySummary && (<DailySummary onClose={() => setShowDailySummary(false)} tasksDone={todayDone} minsLogged={todayMinsTracked} streak={streak} />)}
        </div>
      );
    }

    function StatCard({ label, value, valueColor = "#2D1B4E" }) {
      return (
        <div className="rounded-xl p-3 sm:p-4 bg-white" style={{ border: "1px solid rgba(45,27,78,0.08)" }}>
          <p className="mono text-[10px] uppercase tracking-[0.15em] mb-1" style={{ color: "#7A6D90" }}>{label}</p>
          <p className="text-xl sm:text-2xl font-semibold" style={{ color: valueColor }}>{value}</p>
        </div>
      );
    }

    function WaterGlass({ filled, onClick, index }) {
      // SVG glass: tapered cup shape. Empty = outline only. Full = blue water inside.
      const fillColor = filled ? "#4DA8DA" : "transparent";
      const strokeColor = filled ? "#3A8AB8" : "rgba(45,27,78,0.3)";
      return (
        <button
          onClick={onClick}
          className="flex-shrink-0 transition-transform active:scale-90"
          aria-label={`Glass ${index + 1}, ${filled ? "full" : "empty"}`}
          style={{ background: "transparent", border: "none", padding: "2px", cursor: "pointer" }}
        >
          <svg width="22" height="28" viewBox="0 0 22 28" fill="none">
            {/* Glass outline (always visible) */}
            <path
              d="M3 3 L19 3 L17 25 Q17 26 15.5 26 L6.5 26 Q5 26 5 25 Z"
              fill={fillColor}
              stroke={strokeColor}
              strokeWidth="1.5"
              strokeLinejoin="round"
            />
            {/* Water surface highlight when filled */}
            {filled && (
              <ellipse cx="11" cy="6" rx="7" ry="1.5" fill="rgba(255,255,255,0.4)" />
            )}
            {/* Top rim */}
            <line x1="3" y1="3" x2="19" y2="3" stroke={strokeColor} strokeWidth="1.5" strokeLinecap="round" />
          </svg>
        </button>
      );
    }

    function WellnessToggle({ icon, label, active, onClick, activeColor = "#5BB85B" }) {
      return (
        <button
          onClick={onClick}
          className="flex flex-col items-center justify-center gap-1.5 py-3 rounded-xl transition-all active:scale-95"
          style={{
            background: active ? `${activeColor}14` : "transparent",
            border: `1px solid ${active ? activeColor : "rgba(45,27,78,0.12)"}`,
            color: active ? activeColor : "#7A6D90",
          }}
        >
          <Icon name={icon} size={22} style={{ color: active ? activeColor : "#7A6D90" }} />
          <span className="mono text-[10px] uppercase tracking-[0.12em] font-medium" style={{ color: active ? activeColor : "#7A6D90" }}>
            {label}
          </span>
        </button>
      );
    }

    function WellnessPanel({ water, exercise, diet, onWaterChange, onExerciseToggle, onDietToggle }) {
      const totalGlasses = 10;
      const ml = water * 200;
      const allHit = water >= totalGlasses && exercise && diet;

      const handleGlassClick = (i) => {
        // Tapping a glass: if it's beyond current water level, fill up to it.
        // If it's the last filled glass, empty it (toggle off).
        if (i + 1 <= water) {
          onWaterChange(i); // empty back to (i) glasses
        } else {
          onWaterChange(i + 1); // fill up to (i+1) glasses
        }
      };

      return (
        <div className="rounded-xl bg-white p-4 sm:p-5 mb-5" style={{ border: "1px solid rgba(45,27,78,0.08)" }}>
          <div className="flex items-center justify-between mb-3">
            <p className="mono text-[10px] uppercase tracking-[0.15em] font-medium" style={{ color: "#7A6D90" }}>
              Wellness today
            </p>
            {allHit && (
              <span className="mono text-[9px] uppercase tracking-wider px-2 py-0.5 rounded-full" style={{ background: "rgba(91,184,91,0.15)", color: "#3D8B3D" }}>
                ✓ All hit
              </span>
            )}
          </div>

          {/* Water row */}
          <div className="mb-4">
            <div className="flex items-baseline justify-between mb-2">
              <div className="flex items-baseline gap-2">
                <Icon name="droplet" size={13} style={{ color: "#4DA8DA" }} />
                <span className="text-sm font-medium" style={{ color: "#1F1730" }}>Water</span>
              </div>
              <span className="mono text-[11px]" style={{ color: water >= totalGlasses ? "#3D8B3D" : "#7A6D90" }}>
                {water}/{totalGlasses} · {ml}ml
              </span>
            </div>
            <div className="flex items-center gap-1 sm:gap-1.5 justify-between">
              {Array.from({ length: totalGlasses }, (_, i) => (
                <WaterGlass key={i} index={i} filled={i < water} onClick={() => handleGlassClick(i)} />
              ))}
            </div>
            <p className="mono text-[9px] uppercase tracking-wider mt-2" style={{ color: "#9889AA" }}>
              200 ml each · tap to fill
            </p>
          </div>

          {/* Exercise + Diet */}
          <div className="grid grid-cols-2 gap-2 sm:gap-3">
            <WellnessToggle icon="dumbbell" label="Exercise" active={exercise} onClick={onExerciseToggle} />
            <WellnessToggle icon="apple" label="Healthy diet" active={diet} onClick={onDietToggle} />
          </div>
        </div>
      );
    }

    function SyncIndicator({ status, lastSyncAt, onClick, hasToken }) {
      const config = !hasToken ? { icon: "cloudOff", color: "rgba(255,255,255,0.5)" }
        : status === "syncing" ? { icon: "sync", color: "#F5C85A", spin: true }
        : status === "error" ? { icon: "cloudOff", color: "#FF8A4C" }
        : { icon: "cloud", color: "rgba(255,255,255,0.7)" };
      const lastSyncLabel = lastSyncAt ? lastSyncAt.toLocaleTimeString([], { hour: "numeric", minute: "2-digit" }) : "";
      return (
        <button onClick={onClick} className="p-2 rounded-lg hover:bg-white/10 transition-colors" title={hasToken ? `${status === "idle" ? "Synced" : status}${lastSyncLabel ? ` · last ${lastSyncLabel}` : ""} · tap to refresh` : "Sync off — tap to set up"}>
          <Icon name={config.icon} size={15} style={{ color: config.color }} className={config.spin ? "animate-spin" : ""} />
        </button>
      );
    }

    function QuickAdd({ onAdd }) {
      const [title, setTitle] = useState("");
      const submit = (e) => { e.preventDefault(); if (!title.trim()) return; onAdd({ id: uid(), title: title.trim(), notes: "", status: "todo", priority: "medium", dueDate: null, estimatedMinutes: null, actualMinutes: 0, reminderSet: false, remindMinutesBefore: 15, createdAt: nowISO(), completedAt: null, startedAt: null, tags: [] }); setTitle(""); };
      return (
        <form onSubmit={submit} className="flex items-center gap-2 rounded-xl px-4 py-3 bg-white" style={{ border: "1px solid rgba(45,27,78,0.1)" }}>
          <Icon name="plus" size={16} style={{ color: "#5B3A8F" }} />
          <input value={title} onChange={(e) => setTitle(e.target.value)} placeholder="What needs doing?" className="flex-1 bg-transparent outline-none text-[15px] min-w-0" style={{ color: "#1F1730" }} />
          {title.trim() && (<button type="submit" className="text-[11px] font-semibold uppercase tracking-wider px-3 py-1.5 rounded-lg" style={{ background: "#FF8A4C", color: "#FFFFFF" }}>Add</button>)}
        </form>
      );
    }

    function PriorityDot({ priority }) {
      const colors = { high: "#FF8A4C", medium: "#7E5BC8", low: "#B4A8C8" };
      return <span className="inline-block w-1.5 h-1.5 rounded-full flex-shrink-0" style={{ background: colors[priority] || colors.medium }} />;
    }

    function TaskRow({ task, tick, onToggle, onEdit, onDelete }) {
      const overdue = isOverdue(task);
      const doing = task.status === "doing";
      const done = task.status === "done";
      let liveMins = task.actualMinutes || 0;
      if (doing && task.startedAt) liveMins += (Date.now() - new Date(task.startedAt).getTime()) / 60000;
      const accent = doing ? "#FF8A4C" : done ? "#7E5BC8" : "transparent";
      return (
        <li className="rounded-xl bg-white p-3 sm:p-4 flex items-start gap-3 transition-all" style={{ border: "1px solid rgba(45,27,78,0.08)", borderLeft: `3px solid ${accent}`, boxShadow: doing ? "0 0 0 1px rgba(255,138,76,0.2)" : "none" }}>
          <button onClick={() => onToggle(task, done ? "todo" : "done")} className="mt-0.5 w-6 h-6 sm:w-5 sm:h-5 rounded-full flex-shrink-0 flex items-center justify-center transition-all" style={{ background: done ? "#7E5BC8" : "transparent", border: done ? "2px solid #7E5BC8" : doing ? "2px solid #FF8A4C" : "2px solid rgba(45,27,78,0.25)" }} aria-label={done ? "Mark incomplete" : "Mark complete"}>
            {done && (<svg width="11" height="11" viewBox="0 0 12 12" fill="none"><path className="check-anim" d="M2 6.5 L5 9 L10 3" stroke="#FFFFFF" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" /></svg>)}
            {doing && <span className="w-1.5 h-1.5 rounded-full pulse-dot" style={{ background: "#FF8A4C" }} />}
          </button>
          <div className="flex-1 min-w-0 cursor-pointer" onClick={onEdit}>
            <div className="flex items-start gap-2">
              <span className="mt-1.5"><PriorityDot priority={task.priority} /></span>
              <h3 className="flex-1 text-[15px] leading-snug" style={{ textDecoration: done ? "line-through" : "none", color: done ? "#9889AA" : "#1F1730", fontWeight: doing ? 500 : 400 }}>{task.title}</h3>
            </div>
            {task.notes && (<p className="mt-1 text-[13px] leading-relaxed pl-3.5" style={{ color: done ? "#A899BA" : "#5F4F7A", textDecoration: done ? "line-through" : "none" }}>{task.notes}</p>)}
            <div className="flex flex-wrap items-center gap-x-3 gap-y-1 mt-1.5 pl-3.5 mono text-[10px] uppercase tracking-wider" style={{ color: "#7A6D90" }}>
              {task.dueDate && (<span className="flex items-center gap-1" style={{ color: overdue ? "#FF6B3D" : "#7A6D90" }}><Icon name="calendar" size={10} /> {fmtDateTime(task.dueDate)}{overdue && <Icon name="alert" size={10} />}</span>)}
              {task.estimatedMinutes && (<span className="flex items-center gap-1"><Icon name="clock" size={10} /> est. {fmtDuration(task.estimatedMinutes)}</span>)}
              {(liveMins > 0.1 || doing) && (<span className="flex items-center gap-1" style={{ color: doing ? "#FF6B3D" : "#7A6D90" }}>{doing && <span className="w-1 h-1 rounded-full pulse-dot" style={{ background: "#FF6B3D" }} />}{fmtDuration(liveMins)} {doing ? "running" : "logged"}</span>)}
              {task.reminderSet && task.dueDate && (<span className="flex items-center gap-1"><Icon name="bell" size={10} /> {task.remindMinutesBefore}m before</span>)}
            </div>
            {task.estimatedMinutes && liveMins > 0 && !done && (<div className="mt-2 ml-3.5 h-[2px] rounded-full max-w-xs overflow-hidden" style={{ background: "rgba(45,27,78,0.08)" }}><div className="h-full rounded-full transition-all duration-500" style={{ width: `${Math.min(100, (liveMins / task.estimatedMinutes) * 100)}%`, background: "#FF8A4C" }} /></div>)}
          </div>
          <div className="flex items-center gap-0.5 flex-shrink-0">
            {!done && (<button onClick={(e) => { e.stopPropagation(); onToggle(task, doing ? "todo" : "doing"); }} className="p-2 rounded-lg hover:bg-stone-100" title={doing ? "Pause" : "Start"} style={{ color: doing ? "#FF8A4C" : "#7A6D90" }}><Icon name={doing ? "pause" : "play"} size={14} /></button>)}
            <button onClick={(e) => { e.stopPropagation(); onDelete(); }} className="p-2 rounded-lg hover:bg-stone-100 text-stone-400 hover:text-red-500" title="Delete"><Icon name="trash" size={14} /></button>
          </div>
        </li>
      );
    }

    function TaskEditor({ task, onSave, onClose, onDelete }) {
      const [draft, setDraft] = useState(task || { id: uid(), title: "", notes: "", status: "todo", priority: "medium", dueDate: null, estimatedMinutes: null, actualMinutes: 0, reminderSet: false, remindMinutesBefore: 15, createdAt: nowISO(), completedAt: null, startedAt: null, tags: [] });
      const update = (k, v) => setDraft((d) => ({ ...d, [k]: v }));
      const save = () => { if (!draft.title.trim()) return; onSave({ ...draft, title: draft.title.trim() }); };
      const dtLocalValue = draft.dueDate ? new Date(new Date(draft.dueDate).getTime() - new Date().getTimezoneOffset() * 60000).toISOString().slice(0, 16) : "";
      return (
        <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center sm:p-4" style={{ background: "rgba(31,23,48,0.5)" }} onClick={onClose}>
          <div className="w-full max-w-lg p-5 sm:p-7 max-h-[90vh] overflow-y-auto rounded-t-2xl sm:rounded-2xl bg-white" onClick={(e) => e.stopPropagation()}>
            <div className="flex items-start justify-between mb-5">
              <div>
                <p className="mono uppercase text-[10px] tracking-[0.2em] mb-1" style={{ color: "#7A6D90" }}>{task ? "Edit task" : "New task"}</p>
                <h2 className="text-2xl font-semibold" style={{ color: "#1F1730" }}>{task ? "Refine the details." : "What's the task?"}</h2>
              </div>
              <button onClick={onClose} className="text-stone-400 -mr-2 -mt-1 p-2"><Icon name="x" size={20} /></button>
            </div>
            <div className="space-y-4">
              <div>
                <label className="mono uppercase text-[10px] tracking-[0.2em] block mb-1.5" style={{ color: "#7A6D90" }}>Title</label>
                <input value={draft.title} onChange={(e) => update("title", e.target.value)} autoFocus className="w-full bg-transparent border-b pb-1 text-base outline-none focus:border-orange-500" style={{ borderColor: "rgba(45,27,78,0.2)", color: "#1F1730" }} placeholder="Task name" />
              </div>
              <div>
                <label className="mono uppercase text-[10px] tracking-[0.2em] block mb-1.5" style={{ color: "#7A6D90" }}>Notes</label>
                <textarea value={draft.notes} onChange={(e) => update("notes", e.target.value)} rows={2} className="w-full bg-transparent border-b pb-1 outline-none focus:border-orange-500 resize-none text-sm" style={{ borderColor: "rgba(45,27,78,0.2)", color: "#1F1730" }} placeholder="Optional details" />
              </div>
              <div className="grid grid-cols-2 gap-4">
                <div>
                  <label className="mono uppercase text-[10px] tracking-[0.2em] block mb-1.5" style={{ color: "#7A6D90" }}>Due</label>
                  <input type="datetime-local" value={dtLocalValue} onChange={(e) => update("dueDate", e.target.value ? new Date(e.target.value).toISOString() : null)} className="w-full bg-transparent border-b pb-1 outline-none focus:border-orange-500 text-sm mono" style={{ borderColor: "rgba(45,27,78,0.2)", color: "#1F1730" }} />
                </div>
                <div>
                  <label className="mono uppercase text-[10px] tracking-[0.2em] block mb-1.5" style={{ color: "#7A6D90" }}>Estimated</label>
                  <select value={draft.estimatedMinutes || ""} onChange={(e) => update("estimatedMinutes", e.target.value ? parseInt(e.target.value) : null)} className="w-full bg-transparent border-b pb-1 outline-none focus:border-orange-500 text-sm mono" style={{ borderColor: "rgba(45,27,78,0.2)", color: "#1F1730" }}>
                    <option value="">—</option><option value="5">5 min</option><option value="15">15 min</option><option value="30">30 min</option><option value="60">1 hr</option><option value="120">2 hr</option><option value="240">4 hr</option><option value="480">8 hr</option>
                  </select>
                </div>
              </div>
              <div>
                <label className="mono uppercase text-[10px] tracking-[0.2em] block mb-2" style={{ color: "#7A6D90" }}>Priority</label>
                <div className="flex gap-2">
                  {[["low","Low"],["medium","Medium"],["high","High"]].map(([k, label]) => (
                    <button key={k} onClick={() => update("priority", k)} className="flex items-center gap-1.5 px-3 py-2 text-xs font-medium rounded-lg transition-colors" style={{ background: draft.priority === k ? "#2D1B4E" : "transparent", color: draft.priority === k ? "#FFFFFF" : "#5F4F7A", border: draft.priority === k ? "1px solid #2D1B4E" : "1px solid rgba(45,27,78,0.2)" }}>
                      <PriorityDot priority={k} />{label}
                    </button>
                  ))}
                </div>
              </div>
              {draft.dueDate && (
                <div>
                  <label className="mono uppercase text-[10px] tracking-[0.2em] block mb-2" style={{ color: "#7A6D90" }}>Reminder</label>
                  <div className="flex items-center gap-3 flex-wrap">
                    <button onClick={() => update("reminderSet", !draft.reminderSet)} className="flex items-center gap-1.5 px-3 py-2 text-xs font-medium rounded-lg transition-colors" style={{ background: draft.reminderSet ? "#FF8A4C" : "transparent", color: draft.reminderSet ? "#FFFFFF" : "#5F4F7A", border: draft.reminderSet ? "1px solid #FF8A4C" : "1px solid rgba(45,27,78,0.2)" }}>
                      <Icon name={draft.reminderSet ? "bell" : "bellOff"} size={12} />{draft.reminderSet ? "On" : "Off"}
                    </button>
                    {draft.reminderSet && (
                      <select value={draft.remindMinutesBefore || 15} onChange={(e) => update("remindMinutesBefore", parseInt(e.target.value))} className="bg-transparent border-b pb-1 outline-none focus:border-orange-500 text-xs mono" style={{ borderColor: "rgba(45,27,78,0.2)", color: "#1F1730" }}>
                        <option value="5">5 min before</option><option value="15">15 min before</option><option value="30">30 min before</option><option value="60">1 hr before</option><option value="1440">1 day before</option>
                      </select>
                    )}
                  </div>
                  <p className="mono text-[10px] mt-2 leading-relaxed" style={{ color: "#9889AA" }}>Reminders fire when the app is open. Missed ones appear at the top next time you open it.</p>
                </div>
              )}
            </div>
            <div className="flex items-center justify-between mt-6 pt-5" style={{ borderTop: "1px solid rgba(45,27,78,0.1)" }}>
              {task ? (<button onClick={() => onDelete(task.id)} className="mono uppercase text-[10px] tracking-[0.2em] flex items-center gap-1" style={{ color: "#9889AA" }}><Icon name="trash" size={11} /> Delete</button>) : <span />}
              <div className="flex gap-2">
                <button onClick={onClose} className="text-[11px] font-medium uppercase tracking-wider px-3 py-2" style={{ color: "#7A6D90" }}>Cancel</button>
                <button onClick={save} disabled={!draft.title.trim()} className="text-[11px] font-medium uppercase tracking-wider px-4 py-2 rounded-lg disabled:opacity-30" style={{ background: "#2D1B4E", color: "#FFFFFF" }}>Save</button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function SettingsModal({ onClose, syncStatus, syncError, setSyncStatus, setSyncError, setLastSyncAt, tasks, setTasks, wellness, setWellness, lastPushedRef, lastRemoteUpdatedRef }) {
      const [token, setToken] = useState(Gist.getToken() || "");
      const [working, setWorking] = useState(false);
      const [message, setMessage] = useState(null);
      const hasExistingToken = !!Gist.getToken();
      const connect = async () => {
        const trimmed = token.trim();
        if (!trimmed) { setMessage({ type: "error", text: "Paste a token first." }); return; }
        setWorking(true); setMessage(null);
        try {
          const gistId = await Gist.findOrCreate(trimmed);
          Gist.setToken(trimmed); Gist.setId(gistId);
          const remote = await Gist.fetch(trimmed, gistId);
          if (remote.tasks.length > 0 || Object.keys(remote.wellness || {}).length > 0) {
            setTasks(remote.tasks);
            setWellness(remote.wellness || {});
            lastPushedRef.current = JSON.stringify({ tasks: remote.tasks, wellness: remote.wellness || {} });
          }
          else if (tasks.length > 0 || Object.keys(wellness || {}).length > 0) {
            const updatedAt = await Gist.push(trimmed, gistId, tasks, wellness);
            lastPushedRef.current = JSON.stringify({ tasks, wellness });
            lastRemoteUpdatedRef.current = updatedAt;
          }
          lastRemoteUpdatedRef.current = remote.updatedAt;
          setSyncStatus("idle"); setLastSyncAt(new Date()); setSyncError(null);
          setMessage({ type: "success", text: "Connected. Tasks will now sync." });
          setTimeout(onClose, 1100);
        } catch (e) { setMessage({ type: "error", text: e.message || "Failed. Check the token has 'gist' scope." }); setSyncStatus("error"); }
        finally { setWorking(false); }
      };
      const disconnect = () => {
        if (!confirm("Disconnect sync? Tasks stay on this device but won't sync.")) return;
        Gist.setToken(null); Gist.setId(null);
        setSyncStatus("off"); setSyncError(null); setToken("");
        setMessage({ type: "success", text: "Disconnected." });
        setTimeout(onClose, 700);
      };
      return (
        <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center sm:p-4" style={{ background: "rgba(31,23,48,0.5)" }} onClick={onClose}>
          <div className="w-full max-w-lg p-5 sm:p-7 max-h-[90vh] overflow-y-auto rounded-t-2xl sm:rounded-2xl bg-white" onClick={(e) => e.stopPropagation()}>
            <div className="flex items-start justify-between mb-5">
              <div>
                <p className="mono uppercase text-[10px] tracking-[0.2em] mb-1" style={{ color: "#7A6D90" }}>Settings</p>
                <h2 className="text-2xl font-semibold" style={{ color: "#1F1730" }}>Sync between devices</h2>
              </div>
              <button onClick={onClose} className="text-stone-400 -mr-2 -mt-1 p-2"><Icon name="x" size={20} /></button>
            </div>
            <div className="space-y-4">
              <p className="text-sm leading-relaxed" style={{ color: "#5F4F7A" }}>Tasks save to a private GitHub Gist that only you can see. Use the same token on every device.</p>
              {!hasExistingToken && (
                <div className="rounded-xl px-4 py-3" style={{ background: "rgba(91,58,143,0.05)", border: "1px solid rgba(91,58,143,0.15)" }}>
                  <p className="mono uppercase text-[10px] tracking-[0.2em] mb-2" style={{ color: "#5B3A8F" }}>One-time setup</p>
                  <ol className="text-sm leading-relaxed space-y-1.5 list-decimal list-inside" style={{ color: "#1F1730" }}>
                    <li><a href="https://github.com/settings/tokens/new?description=Almanac%20Sync&scopes=gist" target="_blank" rel="noopener noreferrer" className="font-semibold underline" style={{ color: "#FF8A4C" }}>Create a token →</a></li>
                    <li>Set <span className="mono text-xs">Expiration</span> to "No expiration"</li>
                    <li>Confirm <span className="mono text-xs">gist</span> is checked</li>
                    <li>Click <span className="font-semibold">Generate token</span></li>
                    <li>Copy it (starts with <span className="mono text-xs">ghp_</span>) and paste below</li>
                  </ol>
                </div>
              )}
              <div>
                <label className="mono uppercase text-[10px] tracking-[0.2em] block mb-1.5" style={{ color: "#7A6D90" }}>Personal Access Token</label>
                <input type="password" value={token} onChange={(e) => setToken(e.target.value)} placeholder="ghp_..." autoComplete="off" autoCorrect="off" autoCapitalize="off" spellCheck="false" className="w-full bg-transparent border-b pb-1 outline-none focus:border-orange-500 text-sm mono" style={{ borderColor: "rgba(45,27,78,0.2)", color: "#1F1730" }} />
                <p className="mono text-[10px] mt-2 leading-relaxed" style={{ color: "#9889AA" }}>Stored only in this browser. Sent only to GitHub's API.</p>
              </div>
              {message && (<div className="text-sm py-2 px-3 rounded-lg" style={{ background: message.type === "error" ? "rgba(255,107,61,0.1)" : "rgba(126,91,200,0.1)", color: message.type === "error" ? "#C5491C" : "#5B3A8F", border: `1px solid ${message.type === "error" ? "rgba(255,107,61,0.3)" : "rgba(126,91,200,0.3)"}` }}>{message.text}</div>)}
              {hasExistingToken && syncError && (<div className="text-sm py-2 px-3 rounded-lg" style={{ background: "rgba(255,107,61,0.1)", color: "#C5491C", border: "1px solid rgba(255,107,61,0.3)" }}>Last error: {syncError}</div>)}
            </div>
            <div className="flex items-center justify-between mt-6 pt-5 flex-wrap gap-3" style={{ borderTop: "1px solid rgba(45,27,78,0.1)" }}>
              {hasExistingToken ? (<button onClick={disconnect} className="text-[11px] font-medium uppercase tracking-wider" style={{ color: "#9889AA" }}>Disconnect</button>) : <span />}
              <div className="flex gap-2">
                <button onClick={onClose} className="text-[11px] font-medium uppercase tracking-wider px-3 py-2" style={{ color: "#7A6D90" }}>Cancel</button>
                <button onClick={connect} disabled={!token.trim() || working} className="text-[11px] font-medium uppercase tracking-wider px-4 py-2 rounded-lg disabled:opacity-30 flex items-center gap-2" style={{ background: "#FF8A4C", color: "#FFFFFF" }}>{working && <Icon name="sync" size={11} className="animate-spin" />}{hasExistingToken ? "Reconnect" : "Connect"}</button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function DailySummary({ onClose, tasksDone, minsLogged, streak }) {
      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 fade-in" style={{ background: "rgba(31,23,48,0.6)" }} onClick={onClose}>
          <div className="w-full max-w-md p-7 rounded-2xl text-white text-center relative overflow-hidden scale-bounce" style={{ background: "linear-gradient(135deg, #2D1B4E 0%, #5B3A8F 60%, #6E4DA8 100%)" }} onClick={(e) => e.stopPropagation()}>
            <div className="absolute pointer-events-none" style={{ top: "-30px", right: "-30px", width: "140px", height: "140px", borderRadius: "50%", background: "rgba(255,138,76,0.18)" }} />
            <div className="absolute pointer-events-none" style={{ bottom: "-40px", left: "-40px", width: "120px", height: "120px", borderRadius: "50%", background: "rgba(245,200,90,0.12)" }} />
            <div className="relative">
              <p className="mono uppercase text-[10px] tracking-[0.2em] mb-3" style={{ color: "#F5C85A" }}>Today, complete</p>
              <h2 className="serif italic text-3xl mb-4" style={{ color: "#FFFFFF" }}>You did it.</h2>
              <p className="text-base leading-relaxed mb-6" style={{ color: "#E0D4FF" }}>{tasksDone} task{tasksDone === 1 ? "" : "s"} finished{minsLogged > 1 ? ` · ${fmtDuration(minsLogged)} of focused work` : ""}.{streak > 1 ? ` That's ${streak} days strong.` : streak === 1 ? " A new streak begins." : ""}</p>
              <p className="serif italic text-lg mb-6" style={{ color: "#F5C85A" }}>"{pickQuote("done")}"</p>
              <button onClick={onClose} className="px-6 py-2.5 rounded-lg text-sm font-semibold uppercase tracking-wider" style={{ background: "#FF8A4C", color: "#FFFFFF" }}>Rest well</button>
            </div>
          </div>
        </div>
      );
    }

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('service-worker.js').catch((e) => console.log('SW reg failed:', e));
      });
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
