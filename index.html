          }}
        >
          <Icon name={icon} size={22} style={{ color: active ? activeColor : "#7A6D90" }} />
          <span className="mono text-[10px] uppercase tracking-[0.12em] font-medium" style={{ color: active ? activeColor : "#7A6D90" }}>
            {label}
          </span>
        </button>
      );
    }

    function WellnessPanel({ water, exercise, diet, onWaterChange, onExerciseToggle, onDietToggle }) {
      const totalGlasses = 10;
      const ml = water * 200;
      const allHit = water >= totalGlasses && exercise && diet;

      const handleGlassClick = (i) => {
        // Tapping a glass: if it's beyond current water level, fill up to it.
        // If it's the last filled glass, empty it (toggle off).
        if (i + 1 <= water) {
          onWaterChange(i); // empty back to (i) glasses
        } else {
          onWaterChange(i + 1); // fill up to (i+1) glasses
        }
      };

      return (
        <div className="rounded-xl bg-white p-4 sm:p-5 mb-5" style={{ border: "1px solid rgba(45,27,78,0.08)" }}>
          <div className="flex items-center justify-between mb-3">
            <p className="mono text-[10px] uppercase tracking-[0.15em] font-medium" style={{ color: "#7A6D90" }}>
              Wellness today
            </p>
            {allHit && (
              <span className="mono text-[9px] uppercase tracking-wider px-2 py-0.5 rounded-full" style={{ background: "rgba(91,184,91,0.15)", color: "#3D8B3D" }}>
                ✓ All hit
              </span>
            )}
          </div>

          {/* Water row */}
          <div className="mb-4">
            <div className="flex items-baseline justify-between mb-2">
              <div className="flex items-baseline gap-2">
                <Icon name="droplet" size={13} style={{ color: "#4DA8DA" }} />
                <span className="text-sm font-medium" style={{ color: "#1F1730" }}>Water</span>
              </div>
              <span className="mono text-[11px]" style={{ color: water >= totalGlasses ? "#3D8B3D" : "#7A6D90" }}>
                {water}/{totalGlasses} · {ml}ml
              </span>
            </div>
            <div className="flex items-center gap-1 sm:gap-1.5 justify-between">
              {Array.from({ length: totalGlasses }, (_, i) => (
                <WaterGlass key={i} index={i} filled={i < water} onClick={() => handleGlassClick(i)} />
              ))}
            </div>
            <p className="mono text-[9px] uppercase tracking-wider mt-2" style={{ color: "#9889AA" }}>
              200 ml each · tap to fill
            </p>
          </div>

          {/* Exercise + Diet */}
          <div className="grid grid-cols-2 gap-2 sm:gap-3">
            <WellnessToggle icon="dumbbell" label="Exercise" active={exercise} onClick={onExerciseToggle} />
            <WellnessToggle icon="apple" label="Healthy diet" active={diet} onClick={onDietToggle} />
          </div>
        </div>
      );
    }

    function SyncIndicator({ status, lastSyncAt, onClick, hasToken }) {
      const config = !hasToken ? { icon: "cloudOff", color: "rgba(255,255,255,0.5)" }
        : status === "syncing" ? { icon: "sync", color: "#F5C85A", spin: true }
        : status === "error" ? { icon: "cloudOff", color: "#FF8A4C" }
        : { icon: "cloud", color: "rgba(255,255,255,0.7)" };
      const lastSyncLabel = lastSyncAt ? lastSyncAt.toLocaleTimeString([], { hour: "numeric", minute: "2-digit" }) : "";
      return (
        <button onClick={onClick} className="p-2 rounded-lg hover:bg-white/10 transition-colors" title={hasToken ? `${status === "idle" ? "Synced" : status}${lastSyncLabel ? ` · last ${lastSyncLabel}` : ""} · tap to refresh` : "Sync off — tap to set up"}>
          <Icon name={config.icon} size={15} style={{ color: config.color }} className={config.spin ? "animate-spin" : ""} />
        </button>
      );
    }

    function QuickAdd({ onAdd }) {
      const [title, setTitle] = useState("");
      const submit = (e) => { e.preventDefault(); if (!title.trim()) return; onAdd({ id: uid(), title: title.trim(), notes: "", status: "todo", priority: "medium", dueDate: null, estimatedMinutes: null, actualMinutes: 0, reminderSet: false, remindMinutesBefore: 15, createdAt: nowISO(), completedAt: null, startedAt: null, tags: [] }); setTitle(""); };
      return (
        <form onSubmit={submit} className="flex items-center gap-2 rounded-xl px-4 py-3 bg-white" style={{ border: "1px solid rgba(45,27,78,0.1)" }}>
          <Icon name="plus" size={16} style={{ color: "#5B3A8F" }} />
          <input value={title} onChange={(e) => setTitle(e.target.value)} placeholder="What needs doing?" className="flex-1 bg-transparent outline-none text-[15px] min-w-0" style={{ color: "#1F1730" }} />
          {title.trim() && (<button type="submit" className="text-[11px] font-semibold uppercase tracking-wider px-3 py-1.5 rounded-lg" style={{ background: "#FF8A4C", color: "#FFFFFF" }}>Add</button>)}
        </form>
      );
    }

    function PriorityDot({ priority }) {
      const colors = { high: "#FF8A4C", medium: "#7E5BC8", low: "#B4A8C8" };
      return <span className="inline-block w-1.5 h-1.5 rounded-full flex-shrink-0" style={{ background: colors[priority] || colors.medium }} />;
    }

    function TaskRow({ task, tick, onToggle, onEdit, onDelete }) {
      const overdue = isOverdue(task);
      const doing = task.status === "doing";
      const done = task.status === "done";
      let liveMins = task.actualMinutes || 0;
      if (doing && task.startedAt) liveMins += (Date.now() - new Date(task.startedAt).getTime()) / 60000;
      const accent = doing ? "#FF8A4C" : done ? "#7E5BC8" : "transparent";
      return (
        <li className="rounded-xl bg-white p-3 sm:p-4 flex items-start gap-3 transition-all" style={{ border: "1px solid rgba(45,27,78,0.08)", borderLeft: `3px solid ${accent}`, boxShadow: doing ? "0 0 0 1px rgba(255,138,76,0.2)" : "none" }}>
          <button onClick={() => onToggle(task, done ? "todo" : "done")} className="mt-0.5 w-6 h-6 sm:w-5 sm:h-5 rounded-full flex-shrink-0 flex items-center justify-center transition-all" style={{ background: done ? "#7E5BC8" : "transparent", border: done ? "2px solid #7E5BC8" : doing ? "2px solid #FF8A4C" : "2px solid rgba(45,27,78,0.25)" }} aria-label={done ? "Mark incomplete" : "Mark complete"}>
            {done && (<svg width="11" height="11" viewBox="0 0 12 12" fill="none"><path className="check-anim" d="M2 6.5 L5 9 L10 3" stroke="#FFFFFF" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" /></svg>)}
            {doing && <span className="w-1.5 h-1.5 rounded-full pulse-dot" style={{ background: "#FF8A4C" }} />}
          </button>
          <div className="flex-1 min-w-0 cursor-pointer" onClick={onEdit}>
            <div className="flex items-start gap-2">
              <span className="mt-1.5"><PriorityDot priority={task.priority} /></span>
              <h3 className="flex-1 text-[15px] leading-snug" style={{ textDecoration: done ? "line-through" : "none", color: done ? "#9889AA" : "#1F1730", fontWeight: doing ? 500 : 400 }}>{task.title}</h3>
            </div>
            {task.notes && (<p className="mt-1 text-[13px] leading-relaxed pl-3.5" style={{ color: done ? "#A899BA" : "#5F4F7A", textDecoration: done ? "line-through" : "none" }}>{task.notes}</p>)}
            <div className="flex flex-wrap items-center gap-x-3 gap-y-1 mt-1.5 pl-3.5 mono text-[10px] uppercase tracking-wider" style={{ color: "#7A6D90" }}>
              {task.dueDate && (<span className="flex items-center gap-1" style={{ color: overdue ? "#FF6B3D" : "#7A6D90" }}><Icon name="calendar" size={10} /> {fmtDateTime(task.dueDate)}{overdue && <Icon name="alert" size={10} />}</span>)}
              {task.estimatedMinutes && (<span className="flex items-center gap-1"><Icon name="clock" size={10} /> est. {fmtDuration(task.estimatedMinutes)}</span>)}
              {(liveMins > 0.1 || doing) && (<span className="flex items-center gap-1" style={{ color: doing ? "#FF6B3D" : "#7A6D90" }}>{doing && <span className="w-1 h-1 rounded-full pulse-dot" style={{ background: "#FF6B3D" }} />}{fmtDuration(liveMins)} {doing ? "running" : "logged"}</span>)}
              {task.reminderSet && task.dueDate && (<span className="flex items-center gap-1"><Icon name="bell" size={10} /> {task.remindMinutesBefore}m before</span>)}
            </div>
            {task.estimatedMinutes && liveMins > 0 && !done && (<div className="mt-2 ml-3.5 h-[2px] rounded-full max-w-xs overflow-hidden" style={{ background: "rgba(45,27,78,0.08)" }}><div className="h-full rounded-full transition-all duration-500" style={{ width: `${Math.min(100, (liveMins / task.estimatedMinutes) * 100)}%`, background: "#FF8A4C" }} /></div>)}
          </div>
          <div className="flex items-center gap-0.5 flex-shrink-0">
            {!done && (<button onClick={(e) => { e.stopPropagation(); onToggle(task, doing ? "todo" : "doing"); }} className="p-2 rounded-lg hover:bg-stone-100" title={doing ? "Pause" : "Start"} style={{ color: doing ? "#FF8A4C" : "#7A6D90" }}><Icon name={doing ? "pause" : "play"} size={14} /></button>)}
            <button onClick={(e) => { e.stopPropagation(); onDelete(); }} className="p-2 rounded-lg hover:bg-stone-100 text-stone-400 hover:text-red-500" title="Delete"><Icon name="trash" size={14} /></button>
          </div>
        </li>
      );
    }

    function TaskEditor({ task, onSave, onClose, onDelete }) {
      const [draft, setDraft] = useState(task || { id: uid(), title: "", notes: "", status: "todo", priority: "medium", dueDate: null, estimatedMinutes: null, actualMinutes: 0, reminderSet: false, remindMinutesBefore: 15, createdAt: nowISO(), completedAt: null, startedAt: null, tags: [] });
      const update = (k, v) => setDraft((d) => ({ ...d, [k]: v }));
      const save = () => { if (!draft.title.trim()) return; onSave({ ...draft, title: draft.title.trim() }); };
      const dtLocalValue = draft.dueDate ? new Date(new Date(draft.dueDate).getTime() - new Date().getTimezoneOffset() * 60000).toISOString().slice(0, 16) : "";
      return (
        <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center sm:p-4" style={{ background: "rgba(31,23,48,0.5)" }} onClick={onClose}>
          <div className="w-full max-w-lg p-5 sm:p-7 max-h-[90vh] overflow-y-auto rounded-t-2xl sm:rounded-2xl bg-white" onClick={(e) => e.stopPropagation()}>
            <div className="flex items-start justify-between mb-5">
              <div>
                <p className="mono uppercase text-[10px] tracking-[0.2em] mb-1" style={{ color: "#7A6D90" }}>{task ? "Edit task" : "New task"}</p>
                <h2 className="text-2xl font-semibold" style={{ color: "#1F1730" }}>{task ? "Refine the details." : "What's the task?"}</h2>
              </div>
              <button onClick={onClose} className="text-stone-400 -mr-2 -mt-1 p-2"><Icon name="x" size={20} /></button>
            </div>
            <div className="space-y-4">
              <div>
                <label className="mono uppercase text-[10px] tracking-[0.2em] block mb-1.5" style={{ color: "#7A6D90" }}>Title</label>
                <input value={draft.title} onChange={(e) => update("title", e.target.value)} autoFocus className="w-full bg-transparent border-b pb-1 text-base outline-none focus:border-orange-500" style={{ borderColor: "rgba(45,27,78,0.2)", color: "#1F1730" }} placeholder="Task name" />
              </div>
              <div>
                <label className="mono uppercase text-[10px] tracking-[0.2em] block mb-1.5" style={{ color: "#7A6D90" }}>Notes</label>
                <textarea value={draft.notes} onChange={(e) => update("notes", e.target.value)} rows={2} className="w-full bg-transparent border-b pb-1 outline-none focus:border-orange-500 resize-none text-sm" style={{ borderColor: "rgba(45,27,78,0.2)", color: "#1F1730" }} placeholder="Optional details" />
              </div>
              <div className="grid grid-cols-2 gap-4">
                <div>
                  <label className="mono uppercase text-[10px] tracking-[0.2em] block mb-1.5" style={{ color: "#7A6D90" }}>Due</label>
                  <input type="datetime-local" value={dtLocalValue} onChange={(e) => update("dueDate", e.target.value ? new Date(e.target.value).toISOString() : null)} className="w-full bg-transparent border-b pb-1 outline-none focus:border-orange-500 text-sm mono" style={{ borderColor: "rgba(45,27,78,0.2)", color: "#1F1730" }} />
                </div>
                <div>
                  <label className="mono uppercase text-[10px] tracking-[0.2em] block mb-1.5" style={{ color: "#7A6D90" }}>Estimated</label>
                  <select value={draft.estimatedMinutes || ""} onChange={(e) => update("estimatedMinutes", e.target.value ? parseInt(e.target.value) : null)} className="w-full bg-transparent border-b pb-1 outline-none focus:border-orange-500 text-sm mono" style={{ borderColor: "rgba(45,27,78,0.2)", color: "#1F1730" }}>
                    <option value="">—</option><option value="5">5 min</option><option value="15">15 min</option><option value="30">30 min</option><option value="60">1 hr</option><option value="120">2 hr</option><option value="240">4 hr</option><option value="480">8 hr</option>
                  </select>
                </div>
              </div>
              <div>
                <label className="mono uppercase text-[10px] tracking-[0.2em] block mb-2" style={{ color: "#7A6D90" }}>Priority</label>
                <div className="flex gap-2">
                  {[["low","Low"],["medium","Medium"],["high","High"]].map(([k, label]) => (
                    <button key={k} onClick={() => update("priority", k)} className="flex items-center gap-1.5 px-3 py-2 text-xs font-medium rounded-lg transition-colors" style={{ background: draft.priority === k ? "#2D1B4E" : "transparent", color: draft.priority === k ? "#FFFFFF" : "#5F4F7A", border: draft.priority === k ? "1px solid #2D1B4E" : "1px solid rgba(45,27,78,0.2)" }}>
                      <PriorityDot priority={k} />{label}
                    </button>
                  ))}
                </div>
              </div>
              {draft.dueDate && (
                <div>
                  <label className="mono uppercase text-[10px] tracking-[0.2em] block mb-2" style={{ color: "#7A6D90" }}>Reminder</label>
                  <div className="flex items-center gap-3 flex-wrap">
                    <button onClick={() => update("reminderSet", !draft.reminderSet)} className="flex items-center gap-1.5 px-3 py-2 text-xs font-medium rounded-lg transition-colors" style={{ background: draft.reminderSet ? "#FF8A4C" : "transparent", color: draft.reminderSet ? "#FFFFFF" : "#5F4F7A", border: draft.reminderSet ? "1px solid #FF8A4C" : "1px solid rgba(45,27,78,0.2)" }}>
                      <Icon name={draft.reminderSet ? "bell" : "bellOff"} size={12} />{draft.reminderSet ? "On" : "Off"}
                    </button>
                    {draft.reminderSet && (
                      <select value={draft.remindMinutesBefore || 15} onChange={(e) => update("remindMinutesBefore", parseInt(e.target.value))} className="bg-transparent border-b pb-1 outline-none focus:border-orange-500 text-xs mono" style={{ borderColor: "rgba(45,27,78,0.2)", color: "#1F1730" }}>
                        <option value="5">5 min before</option><option value="15">15 min before</option><option value="30">30 min before</option><option value="60">1 hr before</option><option value="1440">1 day before</option>
                      </select>
                    )}
                  </div>
                  <p className="mono text-[10px] mt-2 leading-relaxed" style={{ color: "#9889AA" }}>Reminders fire when the app is open. Missed ones appear at the top next time you open it.</p>
                </div>
              )}
            </div>
            <div className="flex items-center justify-between mt-6 pt-5" style={{ borderTop: "1px solid rgba(45,27,78,0.1)" }}>
              {task ? (<button onClick={() => onDelete(task.id)} className="mono uppercase text-[10px] tracking-[0.2em] flex items-center gap-1" style={{ color: "#9889AA" }}><Icon name="trash" size={11} /> Delete</button>) : <span />}
              <div className="flex gap-2">
                <button onClick={onClose} className="text-[11px] font-medium uppercase tracking-wider px-3 py-2" style={{ color: "#7A6D90" }}>Cancel</button>
                <button onClick={save} disabled={!draft.title.trim()} className="text-[11px] font-medium uppercase tracking-wider px-4 py-2 rounded-lg disabled:opacity-30" style={{ background: "#2D1B4E", color: "#FFFFFF" }}>Save</button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function PlanView({ goals, weeklyPlan, overdueGoals, capacity, onCapacityChange, budget, onBudgetChange, onAddGoal, onEditGoal, onSessionDone, onSessionUndo, onSetSuggested, onCompleteGoal, onReopenGoal }) {
      const activeGoals = goals.filter(g => g.status !== "completed");
      const completedGoals = goals.filter(g => g.status === "completed");
      const weekTotalSuggested = weeklyPlan.items.reduce((s, x) => s + x.suggested, 0);
      const weekTotalDone = weeklyPlan.items.reduce((s, x) => s + x.completed, 0);
      const weekPct = weekTotalSuggested === 0 ? 0 : Math.round((weekTotalDone / weekTotalSuggested) * 100);
      const [showCompleted, setShowCompleted] = useState(false);

      // Compute budget split: hours per goal this week
      // Each goal's session length (default 30 min if not set)
      // budgetHours = sum(item.suggested * sessionLength) — auto-derived if budget is null
      const goalSessionMinutes = (g) => g.sessionMinutes || 30;
      const autoBudgetHours = weeklyPlan.items.reduce((s, x) => s + (x.suggested * goalSessionMinutes(x.goal)) / 60, 0);
      const effectiveBudget = budget != null ? budget : Math.round(autoBudgetHours * 10) / 10;

      // Per-goal hour allocation (proportional to suggested * sessionLength)
      const budgetSplit = weeklyPlan.items.map((x) => ({
        goal: x.goal,
        sessionMin: goalSessionMinutes(x.goal),
        suggested: x.suggested,
        hours: Math.round(((x.suggested * goalSessionMinutes(x.goal)) / 60) * 10) / 10,
      })).filter(s => s.hours > 0);
      const totalSplitHours = budgetSplit.reduce((s, x) => s + x.hours, 0);

      return (
        <div className="fade-in">
          {/* Week summary card */}
          <div className="rounded-2xl p-5 sm:p-6 mb-4 relative overflow-hidden text-white shadow-lg" style={{ background: "linear-gradient(135deg, #1F4E2D 0%, #2D6E4A 60%, #3D8A5C 100%)" }}>
            <div className="absolute pointer-events-none" style={{ top: "-30px", right: "-30px", width: "140px", height: "140px", borderRadius: "50%", background: "rgba(245,200,90,0.15)" }} />

            <div className="relative flex items-start justify-between mb-4">
              <div>
                <p className="mono text-[10px] tracking-[0.2em] mb-1" style={{ color: "#F5C85A", fontWeight: 500 }}>THIS WEEK · {fmtWeekRange()}</p>
                <h2 className="text-xl sm:text-2xl font-semibold" style={{ color: "#FFFFFF" }}>Your plan</h2>
              </div>
            </div>

            <div className="relative flex items-center gap-4 sm:gap-5">
              <div className="relative flex-shrink-0">
                <ProgressRing pct={weekPct} size={82} stroke={6} color="#F5C85A" trackColor="rgba(255,255,255,0.18)" />
                <div className="absolute inset-0 flex flex-col items-center justify-center">
                  <span className="text-xl font-semibold" style={{ color: "#FFFFFF" }}>{weekPct}%</span>
                  <span className="text-[9px]" style={{ color: "#B8E0C4" }}>{weekTotalDone}/{weekTotalSuggested}</span>
                </div>
              </div>
              <div className="flex-1 min-w-0">
                <p className="text-sm leading-snug mb-1" style={{ color: "#FFFFFF" }}>
                  {weekTotalSuggested === 0
                    ? activeGoals.length === 0 ? "Add a goal to get started." : "No sessions planned this week."
                    : weekPct >= 100 ? "All sessions done. Nice." : weekPct >= 50 ? "Past halfway. Keep going." : "Sessions await."}
                </p>
                <p className="text-[11px]" style={{ color: "#B8E0C4" }}>
                  {effectiveBudget} hr{effectiveBudget === 1 ? "" : "s"}/week budget · {activeGoals.length} active goal{activeGoals.length === 1 ? "" : "s"}
                </p>
              </div>
            </div>
          </div>

          {/* Budget split card — recommended hours per goal this week */}
          {budgetSplit.length > 0 && (
            <div className="rounded-xl bg-white p-4 sm:p-5 mb-4" style={{ border: "1px solid rgba(45,27,78,0.08)" }}>
              <div className="flex items-center justify-between mb-3">
                <p className="mono text-[10px] uppercase tracking-[0.15em] font-medium" style={{ color: "#7A6D90" }}>Recommended split</p>
                <p className="mono text-[11px]" style={{ color: "#5F4F7A" }}>{totalSplitHours} hrs total</p>
              </div>
              <div className="space-y-3">
                {budgetSplit.map((item) => {
                  const priorityColors = { high: "#FF8A4C", medium: "#7E5BC8", low: "#B4A8C8" };
                  const accent = priorityColors[item.goal.priority] || priorityColors.medium;
                  const widthPct = totalSplitHours > 0 ? (item.hours / totalSplitHours) * 100 : 0;
                  return (
                    <div key={item.goal.id}>
                      <div className="flex items-baseline justify-between mb-1">
                        <span className="text-[13px] font-medium truncate pr-2" style={{ color: "#1F1730" }}>{item.goal.title}</span>
                        <span className="mono text-[12px] font-medium flex-shrink-0" style={{ color: accent }}>~{item.hours} hr{item.hours === 1 ? "" : "s"}</span>
                      </div>
                      <div className="h-[5px] rounded-full overflow-hidden" style={{ background: "rgba(45,27,78,0.06)" }}>
                        <div className="h-full rounded-full transition-all duration-500" style={{ width: `${widthPct}%`, background: accent }} />
                      </div>
                      <p className="mono text-[9px] uppercase tracking-wider mt-1" style={{ color: "#9889AA" }}>
                        ~{item.suggested} session{item.suggested === 1 ? "" : "s"} of {item.sessionMin} min · {item.goal.priority} priority
                      </p>
                    </div>
                  );
                })}
              </div>
              <div className="mt-3 pt-3 px-3 py-2.5 rounded-lg text-[12px] leading-relaxed flex items-start gap-2" style={{ background: "rgba(45,27,78,0.04)", color: "#5F4F7A", borderTop: "1px solid rgba(45,27,78,0.06)" }}>
                <span style={{ flexShrink: 0 }}>💡</span>
                <span>You decide which day. The app just tells you how much.</span>
              </div>
            </div>
          )}

          {/* Capacity + Budget settings */}
          <div className="rounded-xl bg-white p-4 mb-4" style={{ border: "1px solid rgba(45,27,78,0.08)" }}>
            <div className="flex items-center justify-between mb-3">
              <div>
                <p className="mono text-[10px] uppercase tracking-[0.15em]" style={{ color: "#7A6D90" }}>Weekly capacity</p>
                <p className="text-sm" style={{ color: "#1F1730" }}>{capacity} session{capacity === 1 ? "" : "s"} per week</p>
              </div>
              <div className="flex items-center gap-1">
                <button onClick={() => onCapacityChange(Math.max(1, capacity - 1))} className="w-8 h-8 rounded-lg flex items-center justify-center" style={{ background: "rgba(45,27,78,0.06)", color: "#5F4F7A" }}>−</button>
                <span className="mono text-sm font-medium px-3" style={{ color: "#1F1730" }}>{capacity}</span>
                <button onClick={() => onCapacityChange(Math.min(50, capacity + 1))} className="w-8 h-8 rounded-lg flex items-center justify-center" style={{ background: "rgba(45,27,78,0.06)", color: "#5F4F7A" }}>+</button>
              </div>
            </div>
            <div className="flex items-center justify-between pt-3" style={{ borderTop: "1px solid rgba(45,27,78,0.06)" }}>
              <div>
                <p className="mono text-[10px] uppercase tracking-[0.15em]" style={{ color: "#7A6D90" }}>Weekly hours</p>
                <p className="text-sm" style={{ color: "#1F1730" }}>{budget != null ? `${budget} hrs (manual)` : `~${effectiveBudget} hrs (auto)`}</p>
              </div>
              <div className="flex items-center gap-1">
                <button onClick={() => onBudgetChange(Math.max(0.5, (budget != null ? budget : effectiveBudget) - 0.5))} className="w-8 h-8 rounded-lg flex items-center justify-center" style={{ background: "rgba(45,27,78,0.06)", color: "#5F4F7A" }}>−</button>
                <span className="mono text-sm font-medium px-3" style={{ color: "#1F1730" }}>{budget != null ? budget : effectiveBudget}</span>
                <button onClick={() => onBudgetChange((budget != null ? budget : effectiveBudget) + 0.5)} className="w-8 h-8 rounded-lg flex items-center justify-center" style={{ background: "rgba(45,27,78,0.06)", color: "#5F4F7A" }}>+</button>
              </div>
            </div>
            {budget != null && (
              <button onClick={() => onBudgetChange(null)} className="mt-2 mono text-[10px] uppercase tracking-wider" style={{ color: "#7A6D90" }}>Reset to auto</button>
            )}
          </div>

          {/* Overdue alert */}
          {overdueGoals.length > 0 && (
            <div className="rounded-xl px-4 py-3 mb-4" style={{ background: "rgba(255,107,61,0.08)", border: "1px solid rgba(255,107,61,0.3)" }}>
              <p className="mono uppercase text-[10px] tracking-[0.2em] mb-2" style={{ color: "#C5491C" }}>Behind pace this week</p>
              <ul className="space-y-1">
                {overdueGoals.map((item) => (
                  <li key={item.goal.id} className="text-sm" style={{ color: "#1F1730" }}>
                    · {item.goal.title} <span className="mono text-[10px]" style={{ color: "#C5491C" }}>{item.completed}/{item.suggested}</span>
                  </li>
                ))}
              </ul>
            </div>
          )}

          {/* This week's focus */}
          <div className="mb-5">
            <div className="flex items-center justify-between mb-3">
              <p className="mono text-[10px] uppercase tracking-[0.15em] font-medium" style={{ color: "#7A6D90" }}>This week's focus</p>
              <button onClick={onAddGoal} className="text-[11px] font-semibold uppercase tracking-wider px-3 py-1.5 rounded-lg flex items-center gap-1" style={{ background: "#FF8A4C", color: "#FFFFFF" }}>
                <Icon name="plus" size={12} /> Add goal
              </button>
            </div>

            {weeklyPlan.items.length === 0 ? (
              <div className="py-10 text-center rounded-xl bg-white" style={{ border: "1px solid rgba(45,27,78,0.08)" }}>
                <p className="serif italic text-xl" style={{ color: "#5B3A8F", opacity: 0.6 }}>
                  {activeGoals.length === 0 ? "No goals yet." : "Nothing scheduled this week."}
                </p>
                <p className="mono text-[11px] uppercase tracking-[0.15em] mt-2" style={{ color: "#5B3A8F", opacity: 0.4 }}>
                  {activeGoals.length === 0 ? "Tap Add goal to begin" : "Try increasing your capacity"}
                </p>
              </div>
            ) : (
              <ul className="space-y-2">
                {weeklyPlan.items.map((item) => (
                  <GoalRow
                    key={item.goal.id}
                    goal={item.goal}
                    suggested={item.suggested}
                    completed={item.completed}
                    weeksLeft={item.weeksLeft}
                    onSessionDone={() => onSessionDone(item.goal)}
                    onSessionUndo={() => onSessionUndo(item.goal)}
                    onSetSuggested={(n) => onSetSuggested(item.goal, n)}
                    onEdit={() => onEditGoal(item.goal)}
                    onComplete={() => onCompleteGoal(item.goal)}
                  />
                ))}
              </ul>
            )}
          </div>

          {/* All active goals (those NOT in this week's plan) */}
          {activeGoals.length > weeklyPlan.items.length && (
            <div className="mb-5">
              <p className="mono text-[10px] uppercase tracking-[0.15em] font-medium mb-3" style={{ color: "#7A6D90" }}>Other active goals</p>
              <ul className="space-y-2">
                {activeGoals.filter(g => !weeklyPlan.items.find(x => x.goal.id === g.id)).map((g) => (
                  <GoalRow
                    key={g.id}
                    goal={g}
                    suggested={0}
                    completed={0}
                    weeksLeft={weeksUntil(g.targetDate)}
                    onEdit={() => onEditGoal(g)}
                    minimal
                  />
                ))}
              </ul>
            </div>
          )}

          {/* Completed goals (collapsible) */}
          {completedGoals.length > 0 && (
            <details className="mt-6" open={showCompleted} onToggle={(e) => setShowCompleted(e.target.open)}>
              <summary className="mono text-[10px] uppercase tracking-[0.15em] font-medium cursor-pointer flex items-center gap-1 mb-3" style={{ color: "#7A6D90", listStyle: "none" }}>
                <Icon name={showCompleted ? "chevronDown" : "chevronRight"} size={12} />
                Completed ({completedGoals.length})
              </summary>
              <ul className="space-y-2">
                {completedGoals.map((g) => (
                  <li key={g.id} className="rounded-xl bg-white p-3 flex items-center justify-between" style={{ border: "1px solid rgba(45,27,78,0.08)", borderLeft: "3px solid #5BB85B" }}>
                    <div className="flex items-center gap-2 min-w-0 flex-1">
                      <Icon name="trophy" size={14} style={{ color: "#5BB85B" }} />
                      <span className="text-sm truncate" style={{ color: "#5F4F7A" }}>{g.title}</span>
                    </div>
                    <button onClick={() => onReopenGoal(g)} className="mono text-[10px] uppercase tracking-wider" style={{ color: "#7A6D90" }}>Reopen</button>
                  </li>
                ))}
              </ul>
            </details>
          )}
        </div>
      );
    }

    function GoalRow({ goal, suggested, completed, weeksLeft, onSessionDone, onSessionUndo, onSetSuggested, onEdit, onComplete, minimal }) {
      const totalProgress = goal.totalSessions ? Math.min(100, ((goal.sessionsDone || 0) / goal.totalSessions) * 100) : 0;
      const priorityColors = { high: "#FF8A4C", medium: "#7E5BC8", low: "#B4A8C8" };
      const accent = priorityColors[goal.priority] || priorityColors.medium;

      return (
        <li className="rounded-xl bg-white p-3 sm:p-4" style={{ border: "1px solid rgba(45,27,78,0.08)", borderLeft: `3px solid ${accent}` }}>
          <div className="flex items-start gap-3">
            <div className="flex-1 min-w-0 cursor-pointer" onClick={onEdit}>
              <div className="flex items-center gap-2">
                <span className="inline-block w-1.5 h-1.5 rounded-full flex-shrink-0" style={{ background: accent }} />
                <h3 className="text-[15px] font-medium" style={{ color: "#1F1730" }}>{goal.title}</h3>
              </div>
              {goal.notes && (
                <p className="text-[12px] mt-1 pl-3.5" style={{ color: "#7A6D90" }}>{goal.notes}</p>
              )}
              <div className="flex flex-wrap items-center gap-x-3 gap-y-1 mt-1.5 pl-3.5 mono text-[10px] uppercase tracking-wider" style={{ color: "#7A6D90" }}>
                {goal.targetDate && (
                  <span className="flex items-center gap-1">
                    <Icon name="calendar" size={10} />
                    {weeksLeft != null ? `${weeksLeft} wk left` : "—"}
                  </span>
                )}
                {goal.totalSessions && (
                  <span className="flex items-center gap-1">
                    <Icon name="target" size={10} /> {goal.sessionsDone || 0}/{goal.totalSessions}
                  </span>
                )}
              </div>
              {goal.totalSessions && (goal.sessionsDone || 0) > 0 && (
                <div className="mt-2 ml-3.5 h-[2px] rounded-full max-w-xs overflow-hidden" style={{ background: "rgba(45,27,78,0.08)" }}>
                  <div className="h-full rounded-full transition-all duration-500" style={{ width: `${totalProgress}%`, background: accent }} />
                </div>
              )}
            </div>
          </div>

          {!minimal && (
            <div className="mt-3 pt-3 flex items-center justify-between" style={{ borderTop: "1px solid rgba(45,27,78,0.06)" }}>
              <div className="flex items-center gap-2 flex-wrap">
                <span className="mono text-[10px] uppercase tracking-wider" style={{ color: "#7A6D90" }}>This week</span>
                <div className="flex items-center gap-1">
                  {Array.from({ length: Math.max(suggested, completed) }).map((_, i) => {
                    const done = i < completed;
                    return (
                      <button key={i}
                        onClick={done ? onSessionUndo : onSessionDone}
                        className="w-6 h-6 rounded-md flex items-center justify-center transition-all"
                        style={{ background: done ? accent : "rgba(45,27,78,0.06)", color: done ? "#FFFFFF" : "#7A6D90", border: done ? "none" : "1px solid rgba(45,27,78,0.12)" }}
                        title={done ? "Undo session" : "Mark session done"}
                      >
                        {done ? <Icon name="check" size={11} /> : null}
                      </button>
                    );
                  })}
                  <button onClick={() => onSetSuggested((suggested || 0) + 1)} className="w-6 h-6 rounded-md flex items-center justify-center" style={{ color: "#7A6D90", border: "1px dashed rgba(45,27,78,0.2)" }} title="Add a session this week">
                    <Icon name="plus" size={10} />
                  </button>
                </div>
                <span className="mono text-[10px]" style={{ color: completed >= suggested && suggested > 0 ? "#3D8B3D" : "#7A6D90" }}>{completed}/{suggested}</span>
              </div>
              {onComplete && goal.totalSessions && (goal.sessionsDone || 0) >= goal.totalSessions && (
                <button onClick={onComplete} className="text-[10px] mono uppercase tracking-wider px-2 py-1 rounded-lg" style={{ background: "#5BB85B", color: "#FFFFFF" }}>
                  Mark complete
                </button>
              )}
            </div>
          )}
        </li>
      );
    }

    function GoalEditor({ goal, onSave, onClose, onDelete }) {
      const defaultTarget = (() => {
        const d = new Date(); d.setMonth(d.getMonth() + 3); d.setHours(23, 59, 59, 999);
        return d.toISOString();
      })();
      const [draft, setDraft] = useState(goal || {
        id: uid(), title: "", notes: "", priority: "medium",
        totalSessions: 12, sessionsDone: 0, sessionMinutes: 30,
        targetDate: defaultTarget,
        status: "active", createdAt: nowISO(), completedAt: null, weekPlan: {},
      });
      const update = (k, v) => setDraft((d) => ({ ...d, [k]: v }));
      const save = () => { if (!draft.title.trim()) return; onSave({ ...draft, title: draft.title.trim() }); };
      const dateValue = draft.targetDate ? new Date(draft.targetDate).toISOString().slice(0, 10) : "";

      return (
        <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center sm:p-4" style={{ background: "rgba(31,23,48,0.5)" }} onClick={onClose}>
          <div className="w-full max-w-lg p-5 sm:p-7 max-h-[90vh] overflow-y-auto rounded-t-2xl sm:rounded-2xl bg-white" onClick={(e) => e.stopPropagation()}>
            <div className="flex items-start justify-between mb-5">
              <div>
                <p className="mono uppercase text-[10px] tracking-[0.2em] mb-1" style={{ color: "#7A6D90" }}>{goal ? "Edit goal" : "New goal"}</p>
                <h2 className="text-2xl font-semibold" style={{ color: "#1F1730" }}>{goal ? "Refine the goal." : "What's the goal?"}</h2>
              </div>
              <button onClick={onClose} className="text-stone-400 -mr-2 -mt-1 p-2"><Icon name="x" size={20} /></button>
            </div>
            <div className="space-y-4">
              <div>
                <label className="mono uppercase text-[10px] tracking-[0.2em] block mb-1.5" style={{ color: "#7A6D90" }}>Title</label>
                <input value={draft.title} onChange={(e) => update("title", e.target.value)} autoFocus className="w-full bg-transparent border-b pb-1 text-base outline-none focus:border-orange-500" style={{ borderColor: "rgba(45,27,78,0.2)", color: "#1F1730" }} placeholder="e.g., Learn Spanish basics" />
              </div>
              <div>
                <label className="mono uppercase text-[10px] tracking-[0.2em] block mb-1.5" style={{ color: "#7A6D90" }}>Notes</label>
                <textarea value={draft.notes} onChange={(e) => update("notes", e.target.value)} rows={2} className="w-full bg-transparent border-b pb-1 outline-none focus:border-orange-500 resize-none text-sm" style={{ borderColor: "rgba(45,27,78,0.2)", color: "#1F1730" }} placeholder="Why this goal?" />
              </div>
              <div className="grid grid-cols-2 gap-4">
                <div>
                  <label className="mono uppercase text-[10px] tracking-[0.2em] block mb-1.5" style={{ color: "#7A6D90" }}>Target date</label>
                  <input type="date" value={dateValue} onChange={(e) => update("targetDate", e.target.value ? new Date(e.target.value + "T23:59:59").toISOString() : null)} className="w-full bg-transparent border-b pb-1 outline-none focus:border-orange-500 text-sm mono" style={{ borderColor: "rgba(45,27,78,0.2)", color: "#1F1730" }} />
                </div>
                <div>
                  <label className="mono uppercase text-[10px] tracking-[0.2em] block mb-1.5" style={{ color: "#7A6D90" }}>Total sessions</label>
                  <input type="number" min="1" max="500" value={draft.totalSessions || ""} onChange={(e) => update("totalSessions", e.target.value ? parseInt(e.target.value) : null)} className="w-full bg-transparent border-b pb-1 outline-none focus:border-orange-500 text-sm mono" style={{ borderColor: "rgba(45,27,78,0.2)", color: "#1F1730" }} />
                </div>
              </div>
              <div>
                <label className="mono uppercase text-[10px] tracking-[0.2em] block mb-1.5" style={{ color: "#7A6D90" }}>Session length</label>
                <select value={draft.sessionMinutes || 30} onChange={(e) => update("sessionMinutes", parseInt(e.target.value))} className="w-full bg-transparent border-b pb-1 outline-none focus:border-orange-500 text-sm mono" style={{ borderColor: "rgba(45,27,78,0.2)", color: "#1F1730" }}>
                  <option value="15">15 min</option>
                  <option value="30">30 min</option>
                  <option value="45">45 min</option>
                  <option value="60">1 hour</option>
                  <option value="90">1.5 hours</option>
                  <option value="120">2 hours</option>
                </select>
                <p className="mono text-[9px] uppercase tracking-wider mt-1.5" style={{ color: "#9889AA" }}>Used for the weekly hour budget. Optional.</p>
              </div>
              <div>
                <label className="mono uppercase text-[10px] tracking-[0.2em] block mb-2" style={{ color: "#7A6D90" }}>Priority</label>
                <div className="flex gap-2">
                  {[["low","Low"],["medium","Medium"],["high","High"]].map(([k, label]) => (
                    <button key={k} onClick={() => update("priority", k)} className="flex items-center gap-1.5 px-3 py-2 text-xs font-medium rounded-lg transition-colors" style={{ background: draft.priority === k ? "#2D1B4E" : "transparent", color: draft.priority === k ? "#FFFFFF" : "#5F4F7A", border: draft.priority === k ? "1px solid #2D1B4E" : "1px solid rgba(45,27,78,0.2)" }}>
                      <PriorityDot priority={k} />{label}
                    </button>
                  ))}
                </div>
              </div>
              {goal && goal.totalSessions && (
                <div>
                  <label className="mono uppercase text-[10px] tracking-[0.2em] block mb-1.5" style={{ color: "#7A6D90" }}>Sessions done</label>
                  <p className="text-sm mono" style={{ color: "#1F1730" }}>{goal.sessionsDone || 0} of {goal.totalSessions}</p>
                </div>
              )}
            </div>
            <div className="flex items-center justify-between mt-6 pt-5" style={{ borderTop: "1px solid rgba(45,27,78,0.1)" }}>
              {goal ? (<button onClick={() => onDelete(goal.id)} className="mono uppercase text-[10px] tracking-[0.2em] flex items-center gap-1" style={{ color: "#9889AA" }}><Icon name="trash" size={11} /> Delete</button>) : <span />}
              <div className="flex gap-2">
                <button onClick={onClose} className="text-[11px] font-medium uppercase tracking-wider px-3 py-2" style={{ color: "#7A6D90" }}>Cancel</button>
                <button onClick={save} disabled={!draft.title.trim()} className="text-[11px] font-medium uppercase tracking-wider px-4 py-2 rounded-lg disabled:opacity-30" style={{ background: "#2D1B4E", color: "#FFFFFF" }}>Save goal</button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function GoalCelebration({ goal, onClose }) {
      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 fade-in" style={{ background: "rgba(31,23,48,0.6)" }} onClick={onClose}>
          <div className="w-full max-w-md p-7 rounded-2xl text-white text-center relative overflow-hidden scale-bounce" style={{ background: "linear-gradient(135deg, #1F4E2D 0%, #2D6E4A 60%, #3D8A5C 100%)" }} onClick={(e) => e.stopPropagation()}>
            <div className="absolute pointer-events-none" style={{ top: "-30px", right: "-30px", width: "140px", height: "140px", borderRadius: "50%", background: "rgba(245,200,90,0.2)" }} />
            <div className="absolute pointer-events-none" style={{ bottom: "-40px", left: "-40px", width: "120px", height: "120px", borderRadius: "50%", background: "rgba(255,138,76,0.15)" }} />
            <div className="relative">
              <div className="inline-flex items-center justify-center w-16 h-16 rounded-full mb-4" style={{ background: "rgba(245,200,90,0.2)", border: "2px solid #F5C85A" }}>
                <Icon name="trophy" size={28} style={{ color: "#F5C85A" }} />
              </div>
              <p className="mono uppercase text-[10px] tracking-[0.2em] mb-2" style={{ color: "#F5C85A" }}>Goal complete</p>
              <h2 className="serif italic text-3xl mb-3" style={{ color: "#FFFFFF" }}>{goal.title}</h2>
              <p className="text-base leading-relaxed mb-6" style={{ color: "#B8E0C4" }}>
                {goal.totalSessions ? `${goal.totalSessions} sessions in.` : ""} You did the work. Take a moment.
              </p>
              <button onClick={onClose} className="px-6 py-2.5 rounded-lg text-sm font-semibold uppercase tracking-wider" style={{ background: "#F5C85A", color: "#1F4E2D" }}>
                Onward
              </button>
            </div>
          </div>
        </div>
      );
    }

    function SettingsModal({ onClose, syncStatus, syncError, setSyncStatus, setSyncError, setLastSyncAt, tasks, setTasks, wellness, setWellness, goals, setGoals, capacity, setCapacity, budget, setBudget, lastPushedRef, lastRemoteUpdatedRef }) {
      const [token, setToken] = useState(Gist.getToken() || "");
      const [working, setWorking] = useState(false);
      const [message, setMessage] = useState(null);
      const hasExistingToken = !!Gist.getToken();
      const connect = async () => {
        const trimmed = token.trim();
        if (!trimmed) { setMessage({ type: "error", text: "Paste a token first." }); return; }
        setWorking(true); setMessage(null);
        try {
          const gistId = await Gist.findOrCreate(trimmed);
          Gist.setToken(trimmed); Gist.setId(gistId);
          const remote = await Gist.fetch(trimmed, gistId);
          const remoteHasData = remote.tasks.length > 0 || Object.keys(remote.wellness || {}).length > 0 || (remote.goals || []).length > 0;
          if (remoteHasData) {
            setTasks(remote.tasks);
            setWellness(remote.wellness || {});
            setGoals(remote.goals || []);
            if (remote.capacity != null) setCapacity(remote.capacity);
            setBudget(remote.budget != null ? remote.budget : null);
            lastPushedRef.current = JSON.stringify({ tasks: remote.tasks, wellness: remote.wellness || {}, goals: remote.goals || [], capacity: remote.capacity, budget: remote.budget });
          }
          else if (tasks.length > 0 || Object.keys(wellness || {}).length > 0 || (goals || []).length > 0) {
            const updatedAt = await Gist.push(trimmed, gistId, tasks, wellness, goals, capacity, budget);
            lastPushedRef.current = JSON.stringify({ tasks, wellness, goals, capacity, budget });
            lastRemoteUpdatedRef.current = updatedAt;
          }
          lastRemoteUpdatedRef.current = remote.updatedAt;
          setSyncStatus("idle"); setLastSyncAt(new Date()); setSyncError(null);
          setMessage({ type: "success", text: "Connected. Tasks will now sync." });
          setTimeout(onClose, 1100);
        } catch (e) { setMessage({ type: "error", text: e.message || "Failed. Check the token has 'gist' scope." }); setSyncStatus("error"); }
        finally { setWorking(false); }
      };
      const disconnect = () => {
        if (!confirm("Disconnect sync? Tasks stay on this device but won't sync.")) return;
        Gist.setToken(null); Gist.setId(null);
        setSyncStatus("off"); setSyncError(null); setToken("");
        setMessage({ type: "success", text: "Disconnected." });
        setTimeout(onClose, 700);
      };
      return (
        <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center sm:p-4" style={{ background: "rgba(31,23,48,0.5)" }} onClick={onClose}>
          <div className="w-full max-w-lg p-5 sm:p-7 max-h-[90vh] overflow-y-auto rounded-t-2xl sm:rounded-2xl bg-white" onClick={(e) => e.stopPropagation()}>
            <div className="flex items-start justify-between mb-5">
              <div>
                <p className="mono uppercase text-[10px] tracking-[0.2em] mb-1" style={{ color: "#7A6D90" }}>Settings</p>
                <h2 className="text-2xl font-semibold" style={{ color: "#1F1730" }}>Sync between devices</h2>
              </div>
              <button onClick={onClose} className="text-stone-400 -mr-2 -mt-1 p-2"><Icon name="x" size={20} /></button>
            </div>
            <div className="space-y-4">
              <p className="text-sm leading-relaxed" style={{ color: "#5F4F7A" }}>Tasks save to a private GitHub Gist that only you can see. Use the same token on every device.</p>
              {!hasExistingToken && (
                <div className="rounded-xl px-4 py-3" style={{ background: "rgba(91,58,143,0.05)", border: "1px solid rgba(91,58,143,0.15)" }}>
                  <p className="mono uppercase text-[10px] tracking-[0.2em] mb-2" style={{ color: "#5B3A8F" }}>One-time setup</p>
                  <ol className="text-sm leading-relaxed space-y-1.5 list-decimal list-inside" style={{ color: "#1F1730" }}>
                    <li><a href="https://github.com/settings/tokens/new?description=Almanac%20Sync&scopes=gist" target="_blank" rel="noopener noreferrer" className="font-semibold underline" style={{ color: "#FF8A4C" }}>Create a token →</a></li>
                    <li>Set <span className="mono text-xs">Expiration</span> to "No expiration"</li>
                    <li>Confirm <span className="mono text-xs">gist</span> is checked</li>
                    <li>Click <span className="font-semibold">Generate token</span></li>
                    <li>Copy it (starts with <span className="mono text-xs">ghp_</span>) and paste below</li>
                  </ol>
                </div>
              )}
              <div>
                <label className="mono uppercase text-[10px] tracking-[0.2em] block mb-1.5" style={{ color: "#7A6D90" }}>Personal Access Token</label>
                <input type="password" value={token} onChange={(e) => setToken(e.target.value)} placeholder="ghp_..." autoComplete="off" autoCorrect="off" autoCapitalize="off" spellCheck="false" className="w-full bg-transparent border-b pb-1 outline-none focus:border-orange-500 text-sm mono" style={{ borderColor: "rgba(45,27,78,0.2)", color: "#1F1730" }} />
                <p className="mono text-[10px] mt-2 leading-relaxed" style={{ color: "#9889AA" }}>Stored only in this browser. Sent only to GitHub's API.</p>
              </div>
              {message && (<div className="text-sm py-2 px-3 rounded-lg" style={{ background: message.type === "error" ? "rgba(255,107,61,0.1)" : "rgba(126,91,200,0.1)", color: message.type === "error" ? "#C5491C" : "#5B3A8F", border: `1px solid ${message.type === "error" ? "rgba(255,107,61,0.3)" : "rgba(126,91,200,0.3)"}` }}>{message.text}</div>)}
              {hasExistingToken && syncError && (<div className="text-sm py-2 px-3 rounded-lg" style={{ background: "rgba(255,107,61,0.1)", color: "#C5491C", border: "1px solid rgba(255,107,61,0.3)" }}>Last error: {syncError}</div>)}
            </div>
            <div className="flex items-center justify-between mt-6 pt-5 flex-wrap gap-3" style={{ borderTop: "1px solid rgba(45,27,78,0.1)" }}>
              {hasExistingToken ? (<button onClick={disconnect} className="text-[11px] font-medium uppercase tracking-wider" style={{ color: "#9889AA" }}>Disconnect</button>) : <span />}
              <div className="flex gap-2">
                <button onClick={onClose} className="text-[11px] font-medium uppercase tracking-wider px-3 py-2" style={{ color: "#7A6D90" }}>Cancel</button>
                <button onClick={connect} disabled={!token.trim() || working} className="text-[11px] font-medium uppercase tracking-wider px-4 py-2 rounded-lg disabled:opacity-30 flex items-center gap-2" style={{ background: "#FF8A4C", color: "#FFFFFF" }}>{working && <Icon name="sync" size={11} className="animate-spin" />}{hasExistingToken ? "Reconnect" : "Connect"}</button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function DailySummary({ onClose, tasksDone, minsLogged, streak }) {
      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 fade-in" style={{ background: "rgba(31,23,48,0.6)" }} onClick={onClose}>
          <div className="w-full max-w-md p-7 rounded-2xl text-white text-center relative overflow-hidden scale-bounce" style={{ background: "linear-gradient(135deg, #2D1B4E 0%, #5B3A8F 60%, #6E4DA8 100%)" }} onClick={(e) => e.stopPropagation()}>
            <div className="absolute pointer-events-none" style={{ top: "-30px", right: "-30px", width: "140px", height: "140px", borderRadius: "50%", background: "rgba(255,138,76,0.18)" }} />
            <div className="absolute pointer-events-none" style={{ bottom: "-40px", left: "-40px", width: "120px", height: "120px", borderRadius: "50%", background: "rgba(245,200,90,0.12)" }} />
            <div className="relative">
              <p className="mono uppercase text-[10px] tracking-[0.2em] mb-3" style={{ color: "#F5C85A" }}>Today, complete</p>
              <h2 className="serif italic text-3xl mb-4" style={{ color: "#FFFFFF" }}>You did it.</h2>
              <p className="text-base leading-relaxed mb-6" style={{ color: "#E0D4FF" }}>{tasksDone} task{tasksDone === 1 ? "" : "s"} finished{minsLogged > 1 ? ` · ${fmtDuration(minsLogged)} of focused work` : ""}.{streak > 1 ? ` That's ${streak} days strong.` : streak === 1 ? " A new streak begins." : ""}</p>
              <p className="serif italic text-lg mb-6" style={{ color: "#F5C85A" }}>"{pickQuote("done")}"</p>
              <button onClick={onClose} className="px-6 py-2.5 rounded-lg text-sm font-semibold uppercase tracking-wider" style={{ background: "#FF8A4C", color: "#FFFFFF" }}>Rest well</button>
            </div>
          </div>
        </div>
      );
    }

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('service-worker.js').catch((e) => console.log('SW reg failed:', e));
      });
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
