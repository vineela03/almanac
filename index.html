<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>The Almanac</title>
  <meta name="description" content="A personal task almanac." />

  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#2D1B4E" />

  <link rel="apple-touch-icon" href="icon-180.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Almanac" />
  <meta name="format-detection" content="telephone=no" />

  <link rel="icon" type="image/png" href="icon-180.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT@9..144,300..900,0..100&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    html, body {
      margin: 0;
      background: #F7F4EF;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
      -webkit-tap-highlight-color: transparent;
      -webkit-text-size-adjust: 100%;
    }
    body { overscroll-behavior-y: none; }
    .app { font-family: 'Inter', system-ui, sans-serif; }
    .serif { font-family: 'Fraunces', Georgia, serif; font-variation-settings: "SOFT" 30, "opsz" 144; letter-spacing: -0.01em; }
    .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
    @keyframes drawCheck { from { stroke-dashoffset: 24; } to { stroke-dashoffset: 0; } }
    .check-anim { stroke-dasharray: 24; animation: drawCheck 0.4s ease-out forwards; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
    .pulse-dot { animation: pulse 1.6s ease-in-out infinite; }
    @keyframes slideDown { from { transform: translateY(-10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .slide-down { animation: slideDown 0.4s ease-out; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .fade-in { animation: fadeIn 0.6s ease-out; }
    @keyframes confettiFall {
      0% { transform: translate(0, 0) rotate(0deg); opacity: 1; }
      100% { transform: translate(var(--x-end), 100vh) rotate(720deg); opacity: 0; }
    }
    .confetti-piece { position: fixed; width: 8px; height: 14px; animation: confettiFall var(--duration) ease-out forwards; pointer-events: none; z-index: 100; }
    @keyframes scaleBounce {
      0% { transform: scale(0.9); opacity: 0; }
      40% { transform: scale(1.05); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }
    .scale-bounce { animation: scaleBounce 0.5s ease-out; }
    button, input, select, textarea { font-size: 16px; }
    .loading { font-family: 'Fraunces', Georgia, serif; font-style: italic; color: #2D1B4E; }
  </style>
</head>
<body>
  <div id="root">
    <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;">
      <p class="loading" style="font-size:1.5rem;opacity:0.5;">Opening the almanac…</p>
    </div>
  </div>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useRef, useMemo } = React;

    const ICON_PATHS = {
      plus: <path d="M12 5v14M5 12h14" />,
      check: <path d="M20 6 9 17l-5-5" />,
      play: <polygon points="6 3 20 12 6 21 6 3" />,
      pause: <g><rect x="6" y="4" width="4" height="16" /><rect x="14" y="4" width="4" height="16" /></g>,
      bell: <g><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9" /><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0" /></g>,
      bellOff: <g><path d="M8.7 3A6 6 0 0 1 18 8a21.3 21.3 0 0 0 .6 5" /><path d="M17 17H3s3-2 3-9" /><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0" /><line x1="2" y1="2" x2="22" y2="22" /></g>,
      trash: <g><polyline points="3 6 5 6 21 6" /><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" /><path d="M10 11v6M14 11v6" /></g>,
      calendar: <g><rect x="3" y="4" width="18" height="18" rx="2" /><line x1="16" y1="2" x2="16" y2="6" /><line x1="8" y1="2" x2="8" y2="6" /><line x1="3" y1="10" x2="21" y2="10" /></g>,
      clock: <g><circle cx="12" cy="12" r="10" /><polyline points="12 6 12 12 16 14" /></g>,
      x: <path d="M18 6 6 18M6 6l12 12" />,
      alert: <g><circle cx="12" cy="12" r="10" /><line x1="12" y1="8" x2="12" y2="12" /><line x1="12" y1="16" x2="12.01" y2="16" /></g>,
      share: <g><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8" /><polyline points="16 6 12 2 8 6" /><line x1="12" y1="2" x2="12" y2="15" /></g>,
      settings: <g><circle cx="12" cy="12" r="3" /><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z" /></g>,
      sync: <g><polyline points="23 4 23 10 17 10" /><polyline points="1 20 1 14 7 14" /><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15" /></g>,
      cloud: <path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z" />,
      cloudOff: <g><path d="M22.61 16.95A5 5 0 0 0 18 10h-1.26a8 8 0 0 0-7.05-6M5 5a8 8 0 0 0 4 15h9a5 5 0 0 0 1.7-.3" /><line x1="1" y1="1" x2="23" y2="23" /></g>,
      flame: <path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z" />,
      repeat: <g><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></g>,
      edit: <g><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></g>,
      dumbbell: <g><path d="M14.4 14.4 9.6 9.6" /><path d="M18.66 14.83 17.24 16.24a2 2 0 0 1-2.83 0l-4.66-4.66a2 2 0 0 1 0-2.83L11.17 7.34a2 2 0 0 1 2.83 0l4.66 4.66a2 2 0 0 1 0 2.83Z"/><path d="m21.64 12.2-1.41 1.42" /><path d="M3.79 11.78 2.37 13.2" /><path d="M5.21 6.84 6.62 5.42a2 2 0 0 1 2.83 0l1.42 1.41" /><path d="m13.13 17.55 1.42 1.41a2 2 0 0 1 0 2.83L13.13 23.2"/></g>,
      apple: <g><path d="M19 11.86c0 4.42-3 8.14-7 8.14s-7-3.72-7-8.14c0-2.49 1.13-4.74 2.83-6 .85-.6 1.83-.86 2.67-.86s1.5.4 1.5.4c.27.13.4.13.5.13s.23 0 .5-.13c0 0 .67-.4 1.5-.4s1.82.26 2.67.86c1.7 1.26 2.83 3.51 2.83 6Z"/><path d="M12 5.5C12 4 13 2 15 2"/></g>,
      droplet: <path d="M12 2.69 4.93 9.76a10 10 0 1 0 14.14 0L12 2.69Z" />,
      target: <g><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></g>,
      trophy: <g><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></g>,
      chevronRight: <polyline points="9 18 15 12 9 6"/>,
      chevronDown: <polyline points="6 9 12 15 18 9"/>,
    };
    const Icon = ({ name, size = 14, className = "", style = {}, ...props }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} style={style} {...props}>{ICON_PATHS[name]}</svg>
    );

    const STORAGE_KEY = "almanac_tasks_v1";
    const LASTSEEN_KEY = "almanac_lastseen";
    const INSTALL_DISMISSED_KEY = "almanac_install_dismissed";
    const GIST_TOKEN_KEY = "almanac_gist_token";
    const GIST_ID_KEY = "almanac_gist_id";
    const WELLNESS_KEY = "almanac_wellness_v1";  // { "YYYY-MM-DD": { water: 0-10, exercise: bool, fasting: bool, calories: bool } }
    const GOALS_KEY = "almanac_goals_v1";  // [{id, title, notes, priority, weeklyMinutes, targetDate, status, createdAt, completedAt, weekLog: { "YYYY-Www": minutesLogged }, dayTags: [0..6]}]
    const CAPACITY_KEY = "almanac_capacity_v1";  // weekly session count
    const BUDGET_KEY = "almanac_weekly_budget_v1";  // weekly hours total
    const SKIPPED_KEY = "almanac_skipped_suggestions_v1";  // { "YYYY-MM-DD": [goalId, goalId, ...] }
    const RECURRING_KEY = "almanac_recurring_v1";  // [{id, title, notes, priority, createdAt, lastCreatedDate: "YYYY-MM-DD", completionDates: ["YYYY-MM-DD", ...]}]
    const NOTES_KEY = "almanac_notes_v1";  // { "YYYY-MM-DD": "journal text..." }

    const loadTasks = () => { try { const v = localStorage.getItem(STORAGE_KEY); return v ? JSON.parse(v) : []; } catch { return []; } };
    const saveTasks = (tasks) => { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks)); } catch (e) { console.error(e); } };
    const loadLastSeen = () => { try { return localStorage.getItem(LASTSEEN_KEY) || null; } catch { return null; } };
    const saveLastSeen = () => { try { localStorage.setItem(LASTSEEN_KEY, new Date().toISOString()); } catch {} };
    const migrateWellnessDay = (day) => {
      if (!day) return day;
      // Legacy: had `diet` (single bool); migrate to fasting + calories
      if (day.diet !== undefined && (day.fasting === undefined || day.calories === undefined)) {
        return {
          water: day.water || 0,
          exercise: !!day.exercise,
          fasting: day.fasting !== undefined ? day.fasting : !!day.diet,
          calories: day.calories !== undefined ? day.calories : !!day.diet,
        };
      }
      return { water: day.water || 0, exercise: !!day.exercise, fasting: !!day.fasting, calories: !!day.calories };
    };
    const loadWellness = () => {
      try {
        const v = localStorage.getItem(WELLNESS_KEY);
        if (!v) return {};
        const parsed = JSON.parse(v);
        const out = {};
        Object.entries(parsed).forEach(([k, day]) => { out[k] = migrateWellnessDay(day); });
        return out;
      } catch { return {}; }
    };
    const saveWellness = (w) => { try { localStorage.setItem(WELLNESS_KEY, JSON.stringify(w)); } catch (e) { console.error(e); } };
    // Migrate legacy goal shape (sessions + sessionMinutes) to new shape (weeklyMinutes + weekLog)
    const migrateGoal = (g) => {
      if (g.weeklyMinutes != null) return g; // already migrated
      const sessionMin = g.sessionMinutes || 30;
      // Estimate weekly minutes from total sessions / weeks left (or 1 session/week if unknown)
      let perWeek = 1;
      if (g.totalSessions && g.targetDate) {
        const weeksLeft = Math.max(1, Math.ceil((new Date(g.targetDate) - new Date()) / (7 * 24 * 3600 * 1000)));
        perWeek = Math.max(1, Math.round((g.totalSessions - (g.sessionsDone || 0)) / weeksLeft));
      } else if (g.totalSessions) {
        perWeek = 1;
      }
      let weeklyMinutes = perWeek * sessionMin;
      // Snap to allowed values (5, 30, 60, 90, 120, ..., 1200)
      const allowed = [5, ...Array.from({ length: 40 }, (_, i) => 30 + i * 30)]; // 5, 30, 60, 90, ..., 1200
      weeklyMinutes = allowed.reduce((best, v) => Math.abs(v - weeklyMinutes) < Math.abs(best - weeklyMinutes) ? v : best, allowed[0]);

      // Convert legacy weekPlan completed sessions into weekLog minutes
      const weekLog = {};
      Object.entries(g.weekPlan || {}).forEach(([wk, p]) => {
        if (p && p.completed) weekLog[wk] = (p.completed || 0) * sessionMin;
      });

      return {
        id: g.id, title: g.title, notes: g.notes || "", priority: g.priority || "medium",
        weeklyMinutes, targetDate: g.targetDate || null,
        status: g.status === "completed" ? "completed" : "active",
        createdAt: g.createdAt || nowISO(), completedAt: g.completedAt || null,
        weekLog,
        dayTags: g.dayTags || [], // [0..6] where 0=Mon, 6=Sun
      };
    };

    const loadGoals = () => { try { const v = localStorage.getItem(GOALS_KEY); const arr = v ? JSON.parse(v) : []; return arr.map(migrateGoal); } catch { return []; } };
    const saveGoals = (g) => { try { localStorage.setItem(GOALS_KEY, JSON.stringify(g)); } catch (e) { console.error(e); } };
    const loadCapacity = () => { try { const v = localStorage.getItem(CAPACITY_KEY); return v ? parseInt(v, 10) : 5; } catch { return 5; } };
    const saveCapacity = (c) => { try { localStorage.setItem(CAPACITY_KEY, String(c)); } catch (e) { console.error(e); } };
    const loadBudget = () => { try { const v = localStorage.getItem(BUDGET_KEY); return v ? parseFloat(v) : null; } catch { return null; } };
    const saveBudget = (b) => { try { if (b == null) localStorage.removeItem(BUDGET_KEY); else localStorage.setItem(BUDGET_KEY, String(b)); } catch (e) { console.error(e); } };
    const loadSkipped = () => { try { const v = localStorage.getItem(SKIPPED_KEY); return v ? JSON.parse(v) : {}; } catch { return {}; } };
    const saveSkipped = (s) => { try { localStorage.setItem(SKIPPED_KEY, JSON.stringify(s)); } catch (e) { console.error(e); } };
    const loadRecurring = () => { try { const v = localStorage.getItem(RECURRING_KEY); return v ? JSON.parse(v) : []; } catch { return []; } };
    const saveRecurring = (r) => { try { localStorage.setItem(RECURRING_KEY, JSON.stringify(r)); } catch (e) { console.error(e); } };
    const loadNotes = () => { try { const v = localStorage.getItem(NOTES_KEY); return v ? JSON.parse(v) : {}; } catch { return {}; } };
    const saveNotes = (n) => { try { localStorage.setItem(NOTES_KEY, JSON.stringify(n)); } catch (e) { console.error(e); } };

    const GIST_FILENAME = "almanac-tasks.json";
    const GIST_DESCRIPTION = "The Almanac — personal task data (private)";
    const Gist = {
      getToken: () => { try { return localStorage.getItem(GIST_TOKEN_KEY) || null; } catch { return null; } },
      setToken: (t) => { try { if (t) localStorage.setItem(GIST_TOKEN_KEY, t); else localStorage.removeItem(GIST_TOKEN_KEY); } catch {} },
      getId: () => { try { return localStorage.getItem(GIST_ID_KEY) || null; } catch { return null; } },
      setId: (id) => { try { if (id) localStorage.setItem(GIST_ID_KEY, id); else localStorage.removeItem(GIST_ID_KEY); } catch {} },
      findOrCreate: async (token) => {
        const r = await fetch("https://api.github.com/gists?per_page=100", { headers: { "Authorization": `Bearer ${token}`, "Accept": "application/vnd.github+json" } });
        if (!r.ok) throw new Error(`GitHub auth failed (${r.status})`);
        const gists = await r.json();
        const existing = gists.find((g) => g.description === GIST_DESCRIPTION && g.files && g.files[GIST_FILENAME]);
        if (existing) return existing.id;
        const cr = await fetch("https://api.github.com/gists", {
          method: "POST",
          headers: { "Authorization": `Bearer ${token}`, "Accept": "application/vnd.github+json", "Content-Type": "application/json" },
          body: JSON.stringify({ description: GIST_DESCRIPTION, public: false, files: { [GIST_FILENAME]: { content: JSON.stringify({ tasks: [], updatedAt: nowISO() }, null, 2) } } }),
        });
        if (!cr.ok) throw new Error(`Couldn't create gist (${cr.status})`);
        const created = await cr.json();
        return created.id;
      },
      fetch: async (token, gistId) => {
        const r = await fetch(`https://api.github.com/gists/${gistId}`, { headers: { "Authorization": `Bearer ${token}`, "Accept": "application/vnd.github+json" } });
        if (!r.ok) throw new Error(`Fetch failed (${r.status})`);
        const data = await r.json();
        const file = data.files && data.files[GIST_FILENAME];
        if (!file) return { tasks: [], wellness: {}, goals: [], capacity: 5, budget: null, recurring: [], notes: {}, updatedAt: null };
        let content = file.content;
        if (file.truncated && file.raw_url) { const raw = await fetch(file.raw_url); content = await raw.text(); }
        try { const parsed = JSON.parse(content); return { tasks: parsed.tasks || [], wellness: parsed.wellness || {}, goals: parsed.goals || [], capacity: parsed.capacity != null ? parsed.capacity : 5, budget: parsed.budget != null ? parsed.budget : null, recurring: parsed.recurring || [], notes: parsed.notes || {}, updatedAt: parsed.updatedAt || null }; }
        catch { return { tasks: [], wellness: {}, goals: [], capacity: 5, budget: null, recurring: [], notes: {}, updatedAt: null }; }
      },
      push: async (token, gistId, tasks, wellness = {}, goals = [], capacity = 5, budget = null, recurring = [], notes = {}) => {
        const payload = { tasks, wellness, goals, capacity, budget, recurring, notes, updatedAt: nowISO() };
        const r = await fetch(`https://api.github.com/gists/${gistId}`, {
          method: "PATCH",
          headers: { "Authorization": `Bearer ${token}`, "Accept": "application/vnd.github+json", "Content-Type": "application/json" },
          body: JSON.stringify({ files: { [GIST_FILENAME]: { content: JSON.stringify(payload, null, 2) } } }),
        });
        if (!r.ok) throw new Error(`Push failed (${r.status})`);
        return payload.updatedAt;
      },
    };

    const isIOS = () => /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
    const isInStandaloneMode = () => window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
    const uid = () => Math.random().toString(36).slice(2, 11);
    const nowISO = () => new Date().toISOString();
    const dateKey = (d) => { const x = new Date(d); return `${x.getFullYear()}-${String(x.getMonth()+1).padStart(2,'0')}-${String(x.getDate()).padStart(2,'0')}`; };

    // Compute current streak for a recurring template — consecutive days ending today (or yesterday if today not yet done)
    const computeRecurringStreak = (template) => {
      const dates = new Set(template.completionDates || []);
      if (dates.size === 0) return 0;
      const today = new Date(); today.setHours(0, 0, 0, 0);
      const todayStr = dateKey(today);
      const yesterday = new Date(today); yesterday.setDate(yesterday.getDate() - 1);
      const yesterdayStr = dateKey(yesterday);

      // Streak counts back from today if today is done, otherwise from yesterday
      // (so the streak number doesn't go to 0 just because today isn't done yet)
      let cursor;
      if (dates.has(todayStr)) cursor = new Date(today);
      else if (dates.has(yesterdayStr)) cursor = new Date(yesterday);
      else return 0;

      let streak = 0;
      while (dates.has(dateKey(cursor))) {
        streak++;
        cursor.setDate(cursor.getDate() - 1);
      }
      return streak;
    };

    // Compute current streak for a wellness item across the wellness map.
    // `predicate(day)` returns true if that day "hit" the goal.
    const computeWellnessStreak = (wellness, predicate) => {
      const today = new Date(); today.setHours(0, 0, 0, 0);
      const todayStr = dateKey(today);
      const yesterday = new Date(today); yesterday.setDate(yesterday.getDate() - 1);
      const yesterdayStr = dateKey(yesterday);

      const hit = (dStr) => {
        const day = wellness[dStr];
        return day ? predicate(day) : false;
      };

      let cursor;
      if (hit(todayStr)) cursor = new Date(today);
      else if (hit(yesterdayStr)) cursor = new Date(yesterday);
      else return 0;

      let streak = 0;
      while (hit(dateKey(cursor))) {
        streak++;
        cursor.setDate(cursor.getDate() - 1);
      }
      return streak;
    };
    const fmtDateTime = (iso) => {
      if (!iso) return "—";
      const d = new Date(iso);
      const today = new Date();
      const tomorrow = new Date(); tomorrow.setDate(today.getDate() + 1);
      const sameDay = (a, b) => a.toDateString() === b.toDateString();
      const time = d.toLocaleTimeString([], { hour: "numeric", minute: "2-digit" });
      if (sameDay(d, today)) return `Today · ${time}`;
      if (sameDay(d, tomorrow)) return `Tomorrow · ${time}`;
      return `${d.toLocaleDateString([], { month: "short", day: "numeric" })} · ${time}`;
    };
    const fmtDuration = (mins) => { if (!mins || mins < 1) return "0m"; const h = Math.floor(mins / 60); const m = Math.floor(mins % 60); if (h && m) return `${h}h ${m}m`; if (h) return `${h}h`; return `${m}m`; };
    const isOverdue = (t) => t.dueDate && t.status !== "done" && new Date(t.dueDate) < new Date();
    const isToday = (iso) => { if (!iso) return false; return new Date(iso).toDateString() === new Date().toDateString(); };

    // ISO week helpers — Monday-Sunday weeks
    const isoWeekKey = (date) => {
      const d = new Date(date);
      d.setHours(0, 0, 0, 0);
      // Thursday in current week decides the year
      const dayOfWeek = (d.getDay() + 6) % 7; // 0 = Mon, 6 = Sun
      d.setDate(d.getDate() - dayOfWeek + 3);
      const firstThu = new Date(d.getFullYear(), 0, 4);
      const firstThuOfYear = (firstThu.getDay() + 6) % 7;
      firstThu.setDate(firstThu.getDate() - firstThuOfYear + 3);
      const week = 1 + Math.round((d - firstThu) / (7 * 24 * 3600 * 1000));
      return `${d.getFullYear()}-W${String(week).padStart(2, '0')}`;
    };
    const startOfWeek = (date = new Date()) => {
      const d = new Date(date); d.setHours(0, 0, 0, 0);
      const day = (d.getDay() + 6) % 7; // 0 = Mon
      d.setDate(d.getDate() - day);
      return d;
    };
    const endOfWeek = (date = new Date()) => {
      const s = startOfWeek(date);
      s.setDate(s.getDate() + 6); s.setHours(23, 59, 59, 999);
      return s;
    };
    const weeksUntil = (targetDateISO) => {
      if (!targetDateISO) return null;
      const target = new Date(targetDateISO);
      const now = startOfWeek();
      const diffMs = target - now;
      return Math.max(0, Math.ceil(diffMs / (7 * 24 * 3600 * 1000)));
    };
    const fmtWeekRange = (date = new Date()) => {
      const s = startOfWeek(date); const e = endOfWeek(date);
      const sStr = s.toLocaleDateString([], { month: "short", day: "numeric" });
      const eStr = e.toLocaleDateString([], { month: "short", day: "numeric" });
      return `${sStr} – ${eStr}`;
    };

    const QUOTES = {
      start: ["Begin where you are. Use what you have.","Small steps are still steps.","The first move is the hardest. Make it now.","Discipline is choosing what you want most over what you want now.","A year from now, you'll wish you started today.","The secret of getting ahead is getting started.","Action is the foundational key to all success.","Don't wait for opportunity. Create it."],
      early: ["Momentum is yours. Keep the pace.","You've started. The hard part is behind you.","Progress, not perfection.","The expert in anything was once a beginner.","Energy follows action. Keep moving.","You're doing better than you think.","Each task done is proof you can.","Steady wins the long game."],
      late: ["Halfway is closer to the end than to the start.","Finish strong. The peak is in sight.","You've come this far. Don't stop now.","The last stretch is where champions are made.","Push through. Future you is watching.","Almost there — every step counts double now.","The reward is at the finish line, not before.","Don't quit on a hard day."],
      done: ["Today is conquered. Rest well.","Discipline delivered. Proud of you.","You did it. Every single one.","This is what consistency looks like.","Days like these build the life you want.","Closed every loop. Sleep easy.","Today's version of you would impress yesterday's.","Mission accomplished. Tomorrow awaits."],
      empty: ["A blank page. What will you write?","Today is a gift. Open it intentionally.","What would today look like if it went well?","Add one task. Just one. That's enough.","Plans without action are wishes."],
    };
    const pickQuote = (bucket) => {
      const list = QUOTES[bucket] || QUOTES.start;
      const seed = dateKey(new Date()) + ":" + bucket;
      let h = 0; for (let i = 0; i < seed.length; i++) h = (h * 31 + seed.charCodeAt(i)) | 0;
      return list[Math.abs(h) % list.length];
    };
    const quoteBucket = (pct, total) => { if (total === 0) return "empty"; if (pct >= 100) return "done"; if (pct >= 50) return "late"; if (pct > 0) return "early"; return "start"; };

    const greeting = () => { const h = new Date().getHours(); if (h < 5) return "Burning the midnight oil"; if (h < 12) return "Good morning"; if (h < 17) return "Make it count"; if (h < 21) return "Evening, finish strong"; return "Wind down well"; };

    const computeStreak = (tasks) => {
      const completedDays = new Set();
      tasks.forEach((t) => { if (t.status === "done" && t.completedAt) completedDays.add(dateKey(t.completedAt)); });
      if (completedDays.size === 0) return 0;
      let streak = 0;
      const cursor = new Date();
      if (!completedDays.has(dateKey(cursor))) cursor.setDate(cursor.getDate() - 1);
      while (completedDays.has(dateKey(cursor))) { streak++; cursor.setDate(cursor.getDate() - 1); }
      return streak;
    };

    const fireConfetti = (intensity = "small") => {
      const count = intensity === "big" ? 60 : 16;
      const colors = ["#FF8A4C", "#F5C85A", "#7E5BC8", "#5B3A8F", "#E8B4D8"];
      const layer = document.createElement("div");
      layer.style.cssText = "position:fixed;inset:0;pointer-events:none;z-index:100;";
      for (let i = 0; i < count; i++) {
        const piece = document.createElement("div");
        const xStart = (Math.random() * 100) + "vw";
        const xEnd = (Math.random() * 200 - 100) + "px";
        const duration = (1.2 + Math.random() * 1.6) + "s";
        const color = colors[Math.floor(Math.random() * colors.length)];
        const rotate = Math.random() * 360;
        piece.className = "confetti-piece";
        piece.style.cssText = `left:${xStart};top:${intensity === "big" ? "20%" : "30%"};background:${color};--x-end:${xEnd};--duration:${duration};transform:rotate(${rotate}deg);border-radius:${Math.random() > 0.5 ? "2px" : "50%"};`;
        layer.appendChild(piece);
      }
      document.body.appendChild(layer);
      setTimeout(() => layer.remove(), 3000);
    };

    function ProgressRing({ pct, size = 90, stroke = 6, color = "#FF8A4C", trackColor = "rgba(255,255,255,0.18)" }) {
      const r = (size - stroke) / 2;
      const c = 2 * Math.PI * r;
      const offset = c - (Math.min(100, pct) / 100) * c;
      return (
        <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={trackColor} strokeWidth={stroke} />
          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke} strokeLinecap="round" strokeDasharray={c} strokeDashoffset={offset} transform={`rotate(-90 ${size/2} ${size/2})`} style={{ transition: "stroke-dashoffset 0.9s cubic-bezier(0.4,0,0.2,1)" }} />
        </svg>
      );
    }

    function App() {
      const [tasks, setTasks] = useState([]);
      const [loaded, setLoaded] = useState(false);
      const [filter, setFilter] = useState("today");
      const [editing, setEditing] = useState(null);
      const [notifPermission, setNotifPermission] = useState(typeof Notification !== "undefined" ? Notification.permission : "default");
      const [tick, setTick] = useState(0);
      const [missedReminders, setMissedReminders] = useState([]);
      const [showIOSInstall, setShowIOSInstall] = useState(false);
      const [showSettings, setShowSettings] = useState(false);
      const [syncStatus, setSyncStatus] = useState(Gist.getToken() ? "idle" : "off");
      const [syncError, setSyncError] = useState(null);
      const [lastSyncAt, setLastSyncAt] = useState(null);
      const [showDailySummary, setShowDailySummary] = useState(false);
      const [wellness, setWellness] = useState(() => loadWellness());
      const [goals, setGoals] = useState(() => loadGoals());
      const [capacity, setCapacity] = useState(() => loadCapacity());
      const [budget, setBudget] = useState(() => loadBudget()); // hours per week, nullable (then auto-derived)
      const [skipped, setSkipped] = useState(() => loadSkipped());
      const [recurring, setRecurring] = useState(() => loadRecurring());
      const [notes, setNotes] = useState(() => loadNotes());
      const [editingRecurring, setEditingRecurring] = useState(null);
      const [showRecurringManager, setShowRecurringManager] = useState(false);
      const [editingGoal, setEditingGoal] = useState(null);
      const [showCelebration, setShowCelebration] = useState(null); // goal that was just completed
      const [view, setView] = useState("today"); // 'today' | 'plan' | 'notes' | 'stats'
      const firedRef = useRef(new Set());
      const pushTimerRef = useRef(null);
      const lastPushedRef = useRef(null);
      const lastRemoteUpdatedRef = useRef(null);
      const prevTodayPctRef = useRef(0);
      const summaryShownTodayRef = useRef(false);

      useEffect(() => {
        const t = loadTasks();
        setTasks(t);
        setLoaded(true);
        const lastSeen = loadLastSeen();
        if (lastSeen) {
          const lastSeenDate = new Date(lastSeen);
          const now = new Date();
          const missed = t.filter((task) => {
            if (task.status === "done" || !task.reminderSet || !task.dueDate || task.remindMinutesBefore == null) return false;
            const triggerAt = new Date(task.dueDate).getTime() - task.remindMinutesBefore * 60000;
            return triggerAt >= lastSeenDate.getTime() && triggerAt <= now.getTime();
          });
          setMissedReminders(missed);
        }
        saveLastSeen();
        if (isIOS() && !isInStandaloneMode() && !localStorage.getItem(INSTALL_DISMISSED_KEY)) setShowIOSInstall(true);
        const seenInterval = setInterval(saveLastSeen, 30000);
        const onHide = () => saveLastSeen();
        document.addEventListener("visibilitychange", onHide);
        window.addEventListener("pagehide", onHide);
        return () => { clearInterval(seenInterval); document.removeEventListener("visibilitychange", onHide); window.removeEventListener("pagehide", onHide); };
      }, []);

      useEffect(() => { if (loaded) saveTasks(tasks); }, [tasks, loaded]);

      // Auto-instantiate recurring tasks once per day, and clean up yesterday's incomplete ones
      useEffect(() => {
        if (!loaded) return;
        if (recurring.length === 0) return;
        const todayStr = dateKey(new Date());
        let changed = false;
        const newTasks = [];
        const updatedRecurring = recurring.map((tpl) => {
          if (tpl.lastCreatedDate === todayStr) return tpl;
          // Defensive: also skip if a task already exists today linked to this template
          const alreadyExists = tasks.some((t) => t.recurringId === tpl.id && (
            (t.status === "done" && t.completedAt && dateKey(t.completedAt) === todayStr) ||
            (t.status !== "done" && t.createdAt && dateKey(t.createdAt) === todayStr)
          ));
          if (alreadyExists) return { ...tpl, lastCreatedDate: todayStr };
          const eod = new Date(); eod.setHours(23, 59, 0, 0);
          newTasks.push({
            id: uid(), title: tpl.title, notes: tpl.notes || "",
            status: "todo", priority: tpl.priority || "medium",
            dueDate: eod.toISOString(), estimatedMinutes: null, actualMinutes: 0,
            reminderSet: false, remindMinutesBefore: 15,
            createdAt: nowISO(), completedAt: null, startedAt: null,
            tags: [], recurringId: tpl.id,
          });
          changed = true;
          return { ...tpl, lastCreatedDate: todayStr };
        });
        if (changed) {
          setRecurring(updatedRecurring);
          // Drop any incomplete recurring task instances created on a previous day (they expire silently)
          setTasks((prev) => {
            const cleaned = prev.filter((t) => {
              if (!t.recurringId) return true; // not a recurring instance, keep
              if (t.status === "done") return true; // done, keep for history/streak
              if (t.createdAt && dateKey(t.createdAt) === todayStr) return true; // created today, keep
              return false; // recurring + not done + not created today → drop
            });
            return [...newTasks, ...cleaned];
          });
        }
      }, [loaded, recurring.length]); // re-run if templates added/removed
      useEffect(() => { saveWellness(wellness); }, [wellness]);
      useEffect(() => { saveGoals(goals); }, [goals]);
      useEffect(() => { saveCapacity(capacity); }, [capacity]);
      useEffect(() => { saveBudget(budget); }, [budget]);
      useEffect(() => { saveSkipped(skipped); }, [skipped]);
      useEffect(() => { saveRecurring(recurring); }, [recurring]);
      useEffect(() => { saveNotes(notes); }, [notes]);

      const todayKey = dateKey(new Date());
      const todayWellness = wellness[todayKey] || { water: 0, exercise: false, fasting: false, calories: false };
      const updateWellness = (patch) => {
        setWellness((prev) => ({ ...prev, [todayKey]: { ...todayWellness, ...patch } }));
      };
      const setWaterGlasses = (n) => updateWellness({ water: Math.max(0, Math.min(10, n)) });
      const toggleExercise = () => updateWellness({ exercise: !todayWellness.exercise });
      const toggleFasting = () => updateWellness({ fasting: !todayWellness.fasting });
      const toggleCalories = () => updateWellness({ calories: !todayWellness.calories });

      // Wellness streaks
      const wellnessStreaks = useMemo(() => ({
        water: computeWellnessStreak(wellness, (d) => (d.water || 0) >= 10),
        exercise: computeWellnessStreak(wellness, (d) => !!d.exercise),
        fasting: computeWellnessStreak(wellness, (d) => !!d.fasting),
        calories: computeWellnessStreak(wellness, (d) => !!d.calories),
      }), [wellness]);

      useEffect(() => {
        if (!loaded) return;
        const token = Gist.getToken(); if (!token) return;
        let cancelled = false;
        (async () => {
          try {
            setSyncStatus("syncing");
            let gistId = Gist.getId();
            if (!gistId) { gistId = await Gist.findOrCreate(token); Gist.setId(gistId); }
            const remote = await Gist.fetch(token, gistId);
            if (cancelled) return;
            const localTasks = loadTasks();
            const localWellness = loadWellness();
            const localGoals = loadGoals();
            const localCapacity = loadCapacity();
            const localBudget = loadBudget();
            const localRecurring = loadRecurring();
            const localNotes = loadNotes();
            const remoteHasData = remote.tasks.length > 0 || Object.keys(remote.wellness || {}).length > 0 || (remote.goals || []).length > 0 || (remote.recurring || []).length > 0 || Object.keys(remote.notes || {}).length > 0;
            if (remoteHasData) {
              setTasks(remote.tasks);
              setWellness(remote.wellness || {});
              setGoals(remote.goals || []);
              setCapacity(remote.capacity != null ? remote.capacity : 5);
              setBudget(remote.budget != null ? remote.budget : null);
              setRecurring(remote.recurring || []);
              setNotes(remote.notes || {});
              lastPushedRef.current = JSON.stringify({ tasks: remote.tasks, wellness: remote.wellness || {}, goals: remote.goals || [], capacity: remote.capacity, budget: remote.budget, recurring: remote.recurring || [], notes: remote.notes || {} });
              lastRemoteUpdatedRef.current = remote.updatedAt;
            }
            else if (localTasks.length > 0 || Object.keys(localWellness).length > 0 || localGoals.length > 0 || localRecurring.length > 0 || Object.keys(localNotes).length > 0) {
              const updatedAt = await Gist.push(token, gistId, localTasks, localWellness, localGoals, localCapacity, localBudget, localRecurring, localNotes);
              lastPushedRef.current = JSON.stringify({ tasks: localTasks, wellness: localWellness, goals: localGoals, capacity: localCapacity, budget: localBudget, recurring: localRecurring, notes: localNotes });
              lastRemoteUpdatedRef.current = updatedAt;
            }
            setSyncStatus("idle"); setLastSyncAt(new Date()); setSyncError(null);
          } catch (e) { if (!cancelled) { setSyncStatus("error"); setSyncError(e.message || "Sync failed"); } }
        })();
        return () => { cancelled = true; };
      }, [loaded]);

      useEffect(() => {
        if (!loaded) return;
        const token = Gist.getToken(); const gistId = Gist.getId();
        if (!token || !gistId) return;
        const serialized = JSON.stringify({ tasks, wellness, goals, capacity, budget, recurring, notes });
        if (serialized === lastPushedRef.current) return;
        if (pushTimerRef.current) clearTimeout(pushTimerRef.current);
        pushTimerRef.current = setTimeout(async () => {
          try {
            setSyncStatus("syncing");
            const updatedAt = await Gist.push(token, gistId, tasks, wellness, goals, capacity, budget, recurring, notes);
            lastPushedRef.current = serialized; lastRemoteUpdatedRef.current = updatedAt;
            setSyncStatus("idle"); setLastSyncAt(new Date()); setSyncError(null);
          } catch (e) { setSyncStatus("error"); setSyncError(e.message || "Sync failed"); }
        }, 1500);
        return () => { if (pushTimerRef.current) clearTimeout(pushTimerRef.current); };
      }, [tasks, wellness, goals, capacity, budget, recurring, notes, loaded]);

      useEffect(() => {
        if (!loaded) return;
        const token = Gist.getToken(); if (!token) return;
        const poll = async () => {
          if (pushTimerRef.current) return;
          if (document.hidden) return;
          try {
            const gistId = Gist.getId(); if (!gistId) return;
            const remote = await Gist.fetch(token, gistId);
            if (remote.updatedAt && remote.updatedAt !== lastRemoteUpdatedRef.current) {
              const remoteSerialized = JSON.stringify({ tasks: remote.tasks, wellness: remote.wellness || {}, goals: remote.goals || [], capacity: remote.capacity, budget: remote.budget, recurring: remote.recurring || [], notes: remote.notes || {} });
              const localSerialized = JSON.stringify({ tasks, wellness, goals, capacity, budget, recurring, notes });
              if (remoteSerialized !== localSerialized) {
                setTasks(remote.tasks);
                setWellness(remote.wellness || {});
                setGoals(remote.goals || []);
                if (remote.capacity != null) setCapacity(remote.capacity);
                setBudget(remote.budget != null ? remote.budget : null);
                setRecurring(remote.recurring || []);
                setNotes(remote.notes || {});
                lastPushedRef.current = remoteSerialized;
                setLastSyncAt(new Date());
              }
              lastRemoteUpdatedRef.current = remote.updatedAt;
            }
          } catch (e) { console.warn("Poll failed:", e); }
        };
        const interval = setInterval(poll, 30000);
        const onVis = () => { if (!document.hidden) poll(); };
        document.addEventListener("visibilitychange", onVis);
        return () => { clearInterval(interval); document.removeEventListener("visibilitychange", onVis); };
      }, [loaded, tasks, wellness, goals, capacity, budget, recurring, notes]);

      const triggerSync = async () => {
        const token = Gist.getToken();
        if (!token) { setShowSettings(true); return; }
        try {
          setSyncStatus("syncing");
          let gistId = Gist.getId();
          if (!gistId) { gistId = await Gist.findOrCreate(token); Gist.setId(gistId); }
          const remote = await Gist.fetch(token, gistId);
          setTasks(remote.tasks);
          setWellness(remote.wellness || {});
          setGoals(remote.goals || []);
          if (remote.capacity != null) setCapacity(remote.capacity);
          setBudget(remote.budget != null ? remote.budget : null);
          setRecurring(remote.recurring || []);
          setNotes(remote.notes || {});
          lastPushedRef.current = JSON.stringify({ tasks: remote.tasks, wellness: remote.wellness || {}, goals: remote.goals || [], capacity: remote.capacity, budget: remote.budget, recurring: remote.recurring || [], notes: remote.notes || {} });
          lastRemoteUpdatedRef.current = remote.updatedAt;
          setSyncStatus("idle"); setLastSyncAt(new Date()); setSyncError(null);
        } catch (e) { setSyncStatus("error"); setSyncError(e.message || "Sync failed"); }
      };

      useEffect(() => {
        const i = setInterval(() => {
          setTick((x) => x + 1);
          const now = Date.now();
          tasks.forEach((t) => {
            if (t.reminderSet && t.dueDate && t.remindMinutesBefore != null && t.status !== "done" && !firedRef.current.has(t.id)) {
              const triggerAt = new Date(t.dueDate).getTime() - t.remindMinutesBefore * 60000;
              if (now >= triggerAt && now <= triggerAt + 60000) {
                firedRef.current.add(t.id);
                if (typeof Notification !== "undefined" && Notification.permission === "granted") {
                  try { new Notification("Task reminder", { body: `${t.title} — due ${fmtDateTime(t.dueDate)}`, tag: t.id, icon: "icon-180.png" }); } catch {}
                }
                try {
                  const ctx = new (window.AudioContext || window.webkitAudioContext)();
                  const o = ctx.createOscillator(); const g = ctx.createGain();
                  o.connect(g); g.connect(ctx.destination);
                  o.frequency.value = 660;
                  g.gain.setValueAtTime(0.0001, ctx.currentTime);
                  g.gain.exponentialRampToValueAtTime(0.15, ctx.currentTime + 0.05);
                  g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.6);
                  o.start(); o.stop(ctx.currentTime + 0.6);
                } catch {}
              }
            }
          });
        }, 1000);
        return () => clearInterval(i);
      }, [tasks]);

      const upsertTask = (t) => setTasks((prev) => { const i = prev.findIndex((x) => x.id === t.id); if (i === -1) return [t, ...prev]; const next = [...prev]; next[i] = t; return next; });
      const removeTask = (id) => setTasks((prev) => prev.filter((t) => t.id !== id));

      const toggleStatus = (t, target) => {
        let next = { ...t };
        const wasNotDone = t.status !== "done";
        if (target === "doing" && t.status !== "doing") { next.status = "doing"; next.startedAt = nowISO(); }
        else if (target === "todo" && t.status === "doing") { const elapsed = (Date.now() - new Date(t.startedAt).getTime()) / 60000; next.actualMinutes = (t.actualMinutes || 0) + elapsed; next.status = "todo"; next.startedAt = null; }
        else if (target === "done") {
          if (t.status === "doing" && t.startedAt) { const elapsed = (Date.now() - new Date(t.startedAt).getTime()) / 60000; next.actualMinutes = (t.actualMinutes || 0) + elapsed; }
          next.status = "done"; next.completedAt = nowISO(); next.startedAt = null;
          if (wasNotDone) fireConfetti("small");
          // If linked to a goal, log the elapsed time to that goal's weekly log
          if (wasNotDone && t.goalId && next.actualMinutes > 0) {
            const linked = goals.find((g) => g.id === t.goalId);
            if (linked && linked.status !== "completed") {
              const wk = isoWeekKey(new Date());
              const weekLog = { ...(linked.weekLog || {}) };
              weekLog[wk] = (weekLog[wk] || 0) + Math.round(next.actualMinutes);
              upsertGoal({ ...linked, weekLog });
            }
          }
          // If linked to a recurring template, record today's completion date for streak
          if (wasNotDone && t.recurringId) {
            const todayStr = dateKey(new Date());
            setRecurring((prev) => prev.map((tpl) => {
              if (tpl.id !== t.recurringId) return tpl;
              const dates = tpl.completionDates || [];
              if (dates.includes(todayStr)) return tpl;
              return { ...tpl, completionDates: [...dates, todayStr] };
            }));
          }
        }
        else if (target === "todo" && t.status === "done") {
          next.status = "todo"; next.completedAt = null;
          // Un-record the completion date if undoing a recurring task done today
          if (t.recurringId && t.completedAt) {
            const completionDay = dateKey(t.completedAt);
            setRecurring((prev) => prev.map((tpl) => {
              if (tpl.id !== t.recurringId) return tpl;
              return { ...tpl, completionDates: (tpl.completionDates || []).filter((d) => d !== completionDay) };
            }));
          }
        }
        upsertTask(next);
      };

      const requestNotifPermission = async () => { if (typeof Notification === "undefined") return; try { const p = await Notification.requestPermission(); setNotifPermission(p); } catch {} };

      // ---------- Goal operations ----------
      const upsertGoal = (g) => setGoals((prev) => {
        const i = prev.findIndex((x) => x.id === g.id);
        if (i === -1) return [g, ...prev];
        const next = [...prev]; next[i] = g; return next;
      });
      const removeGoal = (id) => setGoals((prev) => prev.filter((g) => g.id !== id));
      const completeGoal = (g) => {
        const updated = { ...g, status: "completed", completedAt: nowISO() };
        upsertGoal(updated);
        fireConfetti("big");
        setShowCelebration(updated);
      };
      const reopenGoal = (g) => upsertGoal({ ...g, status: "active", completedAt: null });

      // Log time on a goal (positive or negative minutes)
      const logTime = (g, deltaMinutes) => {
        const wk = isoWeekKey(new Date());
        const weekLog = { ...(g.weekLog || {}) };
        const cur = weekLog[wk] || 0;
        const next = Math.max(0, cur + deltaMinutes);
        weekLog[wk] = next;
        const wasIncreasing = deltaMinutes > 0;
        upsertGoal({ ...g, weekLog });
        if (wasIncreasing) fireConfetti("small");
      };

      // Compute weekly plan: per-goal logged vs committed time for the current week
      const weeklyPlan = useMemo(() => {
        const wk = isoWeekKey(new Date());
        const active = goals.filter((g) => g.status !== "completed");
        const items = active.map((g) => {
          const committed = g.weeklyMinutes || 0;
          const logged = (g.weekLog || {})[wk] || 0;
          return { goal: g, committed, logged };
        }).filter(x => x.committed > 0 || x.logged > 0);
        return { wk, items };
      }, [goals]);

      // Behind pace: it's late in the week and a goal hasn't hit its committed time
      const overdueGoals = useMemo(() => {
        const todayDow = (new Date().getDay() + 6) % 7; // 0=Mon, 6=Sun
        if (todayDow < 5) return []; // only flag Sat/Sun
        return weeklyPlan.items.filter((item) => item.committed > 0 && item.logged < item.committed);
      }, [weeklyPlan]);

      // Suggested goals for today: active goals tagged with today's day index, not already added or skipped today
      const suggestedGoalsForToday = useMemo(() => {
        const today = new Date();
        const todayDow = (today.getDay() + 6) % 7; // 0=Mon, 6=Sun
        const todayKey = today.toISOString().slice(0, 10); // YYYY-MM-DD
        const skippedToday = (skipped[todayKey] || []);
        return goals.filter((g) => {
          if (g.status === "completed") return false;
          if (!g.dayTags || g.dayTags.length === 0) return false;
          if (!g.dayTags.includes(todayDow)) return false;
          if (skippedToday.includes(g.id)) return false;
          // Skip if a task already exists today for this goal
          const hasTaskToday = tasks.some((t) => t.goalId === g.id && (
            (t.status !== "done" && (isToday(t.dueDate) || !t.dueDate)) ||
            (t.status === "done" && isToday(t.completedAt))
          ));
          return !hasTaskToday;
        });
      }, [goals, skipped, tasks]);

      const acceptSuggestion = (goal) => {
        const eod = new Date(); eod.setHours(23, 59, 0, 0);
        const newTask = {
          id: uid(),
          title: goal.title,
          notes: goal.notes || "",
          priority: goal.priority || "medium",
          status: "todo",
          dueDate: eod.toISOString(),
          estimateMinutes: goal.weeklyMinutes ? Math.round(goal.weeklyMinutes / Math.max(1, (goal.dayTags || []).length)) : null,
          actualMinutes: 0,
          startedAt: null,
          completedAt: null,
          createdAt: nowISO(),
          goalId: goal.id,
        };
        upsertTask(newTask);
      };

      const skipSuggestion = (goalId) => {
        const todayKey = new Date().toISOString().slice(0, 10);
        setSkipped((prev) => {
          const cur = prev[todayKey] || [];
          if (cur.includes(goalId)) return prev;
          return { ...prev, [todayKey]: [...cur, goalId] };
        });
      };

      const filtered = tasks.filter((t) => {
        if (filter === "today") { if (t.status === "done") return isToday(t.completedAt); return isToday(t.dueDate) || isOverdue(t); }
        if (filter === "upcoming") { const eod = new Date(); eod.setHours(23, 59, 59, 999); return t.status !== "done" && t.dueDate && new Date(t.dueDate) > eod; }
        if (filter === "overdue") return isOverdue(t);
        if (filter === "recurring") return !!t.recurringId;
        if (filter === "done") return t.status === "done";
        return true;
      }).sort((a, b) => {
        if (a.status === "doing" && b.status !== "doing") return -1;
        if (b.status === "doing" && a.status !== "doing") return 1;
        if (a.status === "done" && b.status !== "done") return 1;
        if (b.status === "done" && a.status !== "done") return -1;
        if (a.dueDate && b.dueDate) return new Date(a.dueDate) - new Date(b.dueDate);
        if (a.dueDate) return -1; if (b.dueDate) return 1;
        return 0;
      });

      const todayTasks = tasks.filter((t) => { if (t.status === "done") return isToday(t.completedAt); return isToday(t.dueDate) || isOverdue(t); });
      const todayDone = todayTasks.filter((t) => t.status === "done").length;
      const todayTotal = todayTasks.length;
      const todayPct = todayTotal === 0 ? 0 : Math.round((todayDone / todayTotal) * 100);

      const todayMinsTracked = tasks.reduce((s, t) => {
        const counts = (t.completedAt && isToday(t.completedAt)) || (t.status === "doing" && t.startedAt);
        if (!counts) return s;
        let m = t.actualMinutes || 0;
        if (t.status === "doing" && t.startedAt) m += (Date.now() - new Date(t.startedAt).getTime()) / 60000;
        return s + m;
      }, 0);

      const weekDone = tasks.filter((t) => { if (t.status !== "done" || !t.completedAt) return false; const c = new Date(t.completedAt); const wkAgo = new Date(); wkAgo.setDate(wkAgo.getDate() - 7); return c > wkAgo; }).length;

      const streak = useMemo(() => computeStreak(tasks), [tasks]);

      useEffect(() => {
        if (!loaded) return;
        if (todayTotal > 0 && todayPct === 100 && prevTodayPctRef.current < 100 && !summaryShownTodayRef.current) {

        }
        prevTodayPctRef.current = todayPct;
      }, [todayPct, todayTotal, loaded]);

      const quote = pickQuote(quoteBucket(todayPct, todayTotal));
      const greetingText = greeting();
      const dateLine = new Date().toLocaleDateString([], { weekday: "long", month: "long", day: "numeric" }).toUpperCase();

      return (
        <div className="app min-h-screen w-full" style={{ background: "#F7F4EF", color: "#1F1730" }}>
          <div className="max-w-3xl mx-auto px-4 py-6 sm:px-8 sm:py-10">

            {showIOSInstall && (
              <div className="slide-down mb-4 rounded-xl px-4 py-3 flex items-start justify-between gap-3" style={{ background: "rgba(91,58,143,0.08)", border: "1px solid rgba(91,58,143,0.2)" }}>
                <div className="flex-1">
                  <p className="mono uppercase text-[10px] tracking-[0.2em] mb-1" style={{ color: "#5B3A8F" }}>Install on iPhone</p>
                  <p className="text-sm leading-relaxed text-stone-700">

                  </p>
                </div>
                <button onClick={() => { localStorage.setItem(INSTALL_DISMISSED_KEY, "1"); setShowIOSInstall(false); }} className="text-stone-500 hover:text-stone-800"><Icon name="x" size={16} /></button>

            {missedReminders.length > 0 && (

            <div className="rounded-2xl p-5 sm:p-7 mb-4 relative overflow-hidden text-white shadow-lg" style={{ background: "linear-gradient(135deg, #2D1B4E 0%, #5B3A8F 60%, #6E4DA8 100%)" }}>
              <div className="absolute pointer-events-none" style={{ top: "-30px", right: "-30px", width: "140px", height: "140px", borderRadius: "50%", background: "rgba(255,138,76,0.18)" }} />

              <div className="relative flex items-start justify-between gap-3 mb-5">

                  <p className="mono text-[10px] tracking-[0.2em] mb-1" style={{ color: "#F5C85A", fontWeight: 500 }}>{dateLine}</p>
                  <h1 className="text-2xl sm:text-3xl font-semibold" style={{ color: "#FFFFFF" }}>{greetingText}</h1>

                <div className="flex items-center gap-1 flex-shrink-0">

                  <div className="absolute inset-0 flex flex-col items-center justify-center">
                    <span className="text-2xl font-semibold" style={{ color: "#FFFFFF" }}>{todayPct}%</span>
                    <span className="text-[10px]" style={{ color: "#C9B8E8" }}>{todayDone} of {todayTotal}</span>
                  </div>
                </div>
                <div className="flex-1 min-w-0">
                  <p className="serif italic text-[15px] sm:text-base leading-snug mb-1" style={{ color: "#F5C85A" }}>"{quote}"</p>
                  <p className="text-[11px]" style={{ color: "#C9B8E8" }}>
                    {todayTotal === 0 ? "No tasks scheduled today." : `${todayTotal} task${todayTotal === 1 ? "" : "s"} · ${fmtDuration(todayMinsTracked)} logged`}

                </div>
              </div>

              <div className="relative mt-4 inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full" style={{ background: "rgba(255,138,76,0.22)", border: "1px solid rgba(255,138,76,0.4)" }}>

                  <Icon name="bell" size={11} /> Enable notifications

            </div>

            <div className="flex gap-1.5 mb-4">
              {[["today","Today"],["plan","Plan"],["notes","Notes"],["stats","Stats"]].map(([k, label]) => {
                const active = view === k;

                const showCount = k === "plan" && planCount > 0;
                return (
                  <button key={k} onClick={() => setView(k)}

            </div>

            {view === "today" && (<>
            <div className="grid grid-cols-2 gap-2 sm:gap-3 mb-3">
              <StatCard label="This week" value={weekDone} valueColor="#2D1B4E" />

            </div>

            <WellnessPanel
              water={todayWellness.water}

              fasting={todayWellness.fasting}
              calories={todayWellness.calories}

              onExerciseToggle={toggleExercise}
              onFastingToggle={toggleFasting}
              onCaloriesToggle={toggleCalories}
              streaks={wellnessStreaks}
            />

            {suggestedGoalsForToday.length > 0 && (
              <div className="mb-3 rounded-xl bg-white p-3 sm:p-4" style={{ border: "1px solid rgba(45,27,78,0.08)" }}>
                <p className="mono text-[10px] uppercase tracking-[0.15em] font-medium mb-2.5" style={{ color: "#7A6D90" }}>Suggested for today</p>
                <ul className="space-y-2">
                  {suggestedGoalsForToday.map((g) => {
                    const priorityColors = { high: "#FF8A4C", medium: "#7E5BC8", low: "#B4A8C8" };
                    const accent = priorityColors[g.priority] || priorityColors.medium;
                    return (
                      <li key={g.id} className="flex items-center gap-2">
                        <span className="inline-block w-1.5 h-1.5 rounded-full flex-shrink-0" style={{ background: accent }} />
                        <span className="text-[14px] flex-1 truncate" style={{ color: "#1F1730" }}>{g.title}</span>
                        <button onClick={() => acceptSuggestion(g)} className="text-[11px] font-semibold uppercase tracking-wider px-3 py-1.5 rounded-lg flex items-center gap-1" style={{ background: "#FF8A4C", color: "#FFFFFF" }}>
                          <Icon name="plus" size={11} /> Add
                        </button>
                        <button onClick={() => skipSuggestion(g.id)} className="text-[11px] uppercase tracking-wider px-2 py-1.5" style={{ color: "#9889AA" }} title="Skip for today">
                          <Icon name="x" size={14} />
                        </button>
                      </li>
                    );
                  })}
                </ul>
              </div>
            )}

            <QuickAdd onAdd={(t) => upsertTask(t)} goals={goals.filter(g => g.status !== "completed")} />

            <nav className="flex gap-x-1 sm:gap-x-2 mt-5 mb-4 overflow-x-auto -mx-1 px-1 pb-1 items-center">
              {[["today","Today"],["upcoming","Upcoming"],["overdue","Overdue"],["recurring","Recurring"],["all","All"],["done","Archive"]].map(([k, label]) => {
                const endOfToday = new Date(); endOfToday.setHours(23, 59, 59, 999);
                const count = k === "today" ? todayTasks.length :
                  k === "upcoming" ? tasks.filter((t) => t.status !== "done" && t.dueDate && new Date(t.dueDate) > endOfToday).length :
                  k === "overdue" ? tasks.filter(isOverdue).length :
                  k === "recurring" ? tasks.filter((t) => t.recurringId).length :
                  k === "done" ? tasks.filter((t) => t.status === "done").length : tasks.length;
                const active = filter === k;
                return (
                  <button key={k} onClick={() => setFilter(k)}
                    className="text-[12px] font-medium px-3 py-1.5 rounded-full whitespace-nowrap transition-all"
                    style={{ background: active ? "#2D1B4E" : "transparent", color: active ? "#FFFFFF" : "#5F4F7A", border: active ? "1px solid #2D1B4E" : "1px solid rgba(45,27,78,0.15)" }}>
                    {label} <span style={{ opacity: 0.6 }}>{count}</span>
                  </button>
                );
              })}
              {filter === "recurring" && (
                <button onClick={() => setShowRecurringManager(true)}
                  className="text-[11px] font-semibold uppercase tracking-wider px-3 py-1.5 rounded-full whitespace-nowrap flex-shrink-0 ml-auto"
                  style={{ background: "#FF8A4C", color: "#FFFFFF" }}>
                  Manage
                </button>
              )}
            </nav>

            <main>
              {filtered.length === 0 ? (
                <div className="py-16 text-center fade-in">
                  <p className="serif italic text-2xl sm:text-3xl" style={{ color: "#5B3A8F", opacity: 0.6 }}>
                    {filter === "today" ? "Your day is open." : filter === "done" ? "Nothing archived yet." : "No entries here."}
                  </p>
                  <p className="mono text-[11px] uppercase tracking-[0.15em] mt-3" style={{ color: "#5B3A8F", opacity: 0.4 }}>
                    {filter === "today" ? "Add a task above to begin" : "Try another view"}
                  </p>
                </div>
              ) : (
                <ul className="space-y-2">
                  {filtered.map((t) => (<TaskRow key={t.id} task={t} tick={tick} onToggle={toggleStatus} onEdit={() => setEditing(t)} onDelete={() => removeTask(t.id)} recurringTemplate={t.recurringId ? recurring.find((r) => r.id === t.recurringId) : null} />))}
                </ul>
              )}
            </main>
            </>)}

            {view === "plan" && (
              <PlanView
                goals={goals}
                weeklyPlan={weeklyPlan}
                overdueGoals={overdueGoals}
                budget={budget}
                onBudgetChange={setBudget}
                onAddGoal={() => setEditingGoal("new")}
                onEditGoal={(g) => setEditingGoal(g)}
                onLogTime={logTime}
                onCompleteGoal={completeGoal}
                onReopenGoal={reopenGoal}
              />
            )}

            {view === "notes" && (
              <NotesView notes={notes} setNotes={setNotes} />
            )}

            {view === "stats" && (
              <StatsView wellness={wellness} recurring={recurring} />
            )}

            <footer className="mt-12 pt-5 border-t border-stone-300/40">
              <p className="mono text-[10px] uppercase tracking-[0.2em] text-stone-500">
                {tasks.length} {tasks.length === 1 ? "entry" : "entries"} · saved {Gist.getToken() ? "synced" : "on this device"}
              </p>
            </footer>
          </div>

          {editing && (<TaskEditor task={editing === "new" ? null : editing} onSave={(t) => { upsertTask(t); setEditing(null); }} onClose={() => setEditing(null)} onDelete={(id) => { removeTask(id); setEditing(null); }} />)}
          {editingGoal && (<GoalEditor goal={editingGoal === "new" ? null : editingGoal} onSave={(g) => { upsertGoal(g); setEditingGoal(null); }} onClose={() => setEditingGoal(null)} onDelete={(id) => { removeGoal(id); setEditingGoal(null); }} />)}
          {showSettings && (<SettingsModal onClose={() => setShowSettings(false)} syncStatus={syncStatus} syncError={syncError} setSyncStatus={setSyncStatus} setSyncError={setSyncError} setLastSyncAt={setLastSyncAt} tasks={tasks} setTasks={setTasks} wellness={wellness} setWellness={setWellness} goals={goals} setGoals={setGoals} capacity={capacity} setCapacity={setCapacity} budget={budget} setBudget={setBudget} recurring={recurring} setRecurring={setRecurring} notes={notes} setNotes={setNotes} lastPushedRef={lastPushedRef} lastRemoteUpdatedRef={lastRemoteUpdatedRef} />)}
          {showRecurringManager && (<RecurringManager recurring={recurring} onClose={() => setShowRecurringManager(false)} onAdd={() => setEditingRecurring("new")} onEdit={(t) => setEditingRecurring(t)} onDelete={(id) => setRecurring((prev) => prev.filter((r) => r.id !== id))} />)}
          {editingRecurring && (<RecurringEditor template={editingRecurring === "new" ? null : editingRecurring} onSave={(t) => { setRecurring((prev) => { const i = prev.findIndex((x) => x.id === t.id); if (i === -1) return [t, ...prev]; const next = [...prev]; next[i] = t; return next; }); setEditingRecurring(null); }} onClose={() => setEditingRecurring(null)} onDelete={(id) => { setRecurring((prev) => prev.filter((r) => r.id !== id)); setEditingRecurring(null); }} />)}
          {showDailySummary && (<DailySummary onClose={() => setShowDailySummary(false)} tasksDone={todayDone} minsLogged={todayMinsTracked} streak={streak} />)}
          {showCelebration && (<GoalCelebration goal={showCelebration} onClose={() => setShowCelebration(null)} />)}
        </div>
      );
    }

    function StatCard({ label, value, valueColor = "#2D1B4E" }) {
      return (
        <div className="rounded-xl p-3 sm:p-4 bg-white" style={{ border: "1px solid rgba(45,27,78,0.08)" }}>

          <p className="text-xl sm:text-2xl font-semibold" style={{ color: valueColor }}>{value}</p>

    function WaterGlass({ filled, onClick, index }) {

            {label}

    function WellnessPanel({ water, exercise, fasting, calories, onWaterChange, onExerciseToggle, onFastingToggle, onCaloriesToggle, streaks }) {
      const totalGlasses = 10;
      const ml = water * 200;
      const allHit = water >= totalGlasses && exercise && fasting && calories;

      const handleGlassClick = (i) => {
        if (i + 1 <= water) onWaterChange(i);

      return (
        <div className="rounded-xl bg-white p-4 sm:p-5 mb-5" style={{ border: "1px solid rgba(45,27,78,0.08)" }}>
